<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2332;--ac:#00e5ff;--ac2:#7c3aed;--ok:#10b981;--no:#ef4444;--txt:#e2e8f0;--mut:#64748b;--bor:#1e293b;--gold:#f59e0b;--warn:#f97316}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
.app{max-width:960px;margin:0 auto;padding:14px}
header{text-align:center;padding:22px 0 14px;border-bottom:1px solid var(--bor);margin-bottom:14px}
header h1{font-size:1.35rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--mut);margin-top:3px;font-size:.75rem}
.bb{background:none;border:1px solid var(--bor);color:var(--ac);padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.76rem;margin-bottom:10px;transition:.1s;margin-right:4px}
.bb:hover{background:var(--card)}
.sg{display:grid;gap:3px}
.sb{background:var(--card);border:1px solid var(--bor);color:var(--txt);padding:8px 10px;border-radius:6px;cursor:pointer;text-align:left;font-family:inherit;font-size:.78rem;transition:.1s;display:flex;align-items:center;gap:7px}
.sb:hover{background:var(--card2);border-color:var(--ac);transform:translateX(2px)}
.sb .n{background:var(--ac2);color:#fff;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:.63rem;flex-shrink:0}
.sb .qc{margin-left:auto;color:var(--ac);font-size:.6rem;font-family:'JetBrains Mono',monospace;font-weight:600;flex-shrink:0}
.sb.gl{border-color:var(--gold)}.sb.gl .n{background:var(--gold)}
.sb.sp{border-color:var(--warn)}.sb.sp .n{background:var(--warn)}
.sb.bp{border-color:var(--ok)}.sb.bp .n{background:var(--ok)}
.lt{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.53rem;font-family:'JetBrains Mono',monospace;font-weight:700;margin-left:3px;vertical-align:middle}
.l1{background:#2d0a0a;color:#ef4444;border:1px solid #5c1a1a}
.l2{background:#2d1f0a;color:#f59e0b;border:1px solid #5c3a1a}
.l3{background:#0a2d1a;color:#10b981;border:1px solid #1a5c3a}
.l4{background:#0a1a2d;color:#3b82f6;border:1px solid #1a3a5c}
.l7{background:#1a0a2d;color:#a855f7;border:1px solid #3a1a5c}
.lm{background:#1a1a2d;color:#818cf8;border:1px solid #3a3a5c}
.sh{margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bor)}
.sh h2{font-size:1rem;font-weight:700;color:var(--ac)}
.sh p{color:var(--mut);font-size:.72rem;margin-top:2px}
.cs{background:var(--card);border:1px solid var(--bor);border-radius:8px;padding:11px;margin-bottom:7px}
.cs h3{font-size:.8rem;font-weight:700;color:var(--ac);margin-bottom:4px}
.cs ul{list-style:none;padding:0}
.cs li{font-size:.72rem;color:#cbd5e1;padding:2px 0 2px 10px;position:relative;line-height:1.3}
.cs li::before{content:"▸";position:absolute;left:0;color:var(--ac2)}
.cm{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:#0f172a;color:var(--ac);padding:1px 4px;border-radius:3px}
.lc{background:linear-gradient(135deg,#0f172a,#111827);border:1px solid #1e3a5f;border-radius:8px;padding:11px;margin-bottom:7px}
.lc h3{font-size:.8rem;font-weight:700;color:var(--warn);margin-bottom:3px}
.ls{background:#0a0e17;border:1px solid var(--bor);border-radius:5px;padding:6px 8px;margin-bottom:3px;font-size:.7rem}
.ls .sn2{color:var(--warn);font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.63rem}
.ls .sc{font-family:'JetBrains Mono',monospace;color:var(--ac);font-size:.66rem;display:block;margin-top:2px;padding:3px 6px;background:#0f172a;border-radius:3px;white-space:pre-wrap}
.vc{background:var(--bg);border:1px solid var(--bor);border-radius:6px;padding:6px 8px;margin-bottom:3px}
.vc .vt{font-weight:700;font-size:.72rem;color:var(--gold);margin-bottom:1px}
.vc .vd{font-size:.66rem;color:#94a3b8;line-height:1.3}
.gs{width:100%;background:var(--card);border:1px solid var(--bor);color:var(--txt);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:.8rem;margin-bottom:10px}
.gs:focus{outline:none;border-color:var(--ac)}
.gl2{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:800;color:var(--ac2);padding:6px 0 2px;border-bottom:1px solid var(--bor);margin:7px 0 4px}
.rb{background:#0f172a;border:1px solid var(--bor);border-radius:6px;padding:7px 9px;margin-bottom:7px;font-size:.68rem;color:#94a3b8}
.rb strong{color:var(--ac);font-weight:600}
.rb .br{display:block;margin-top:2px}
.qc2{background:var(--card);border:1px solid var(--bor);border-radius:7px;padding:10px;margin-bottom:7px}
.qc2 .qn{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--ac);margin-bottom:3px}
.qc2 .qt{font-size:.8rem;line-height:1.4;margin-bottom:6px}
.ob{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--bor);color:var(--txt);padding:6px 9px;border-radius:5px;margin-bottom:3px;cursor:pointer;font-family:inherit;font-size:.74rem;line-height:1.3;transition:.1s}
.ob:hover:not(.lk){border-color:var(--ac);background:#0f1a2e}
.ob.sel{border-color:var(--ac);background:#0f1a2e}
.ob.ca{border-color:var(--ok);background:#052e1c;color:#6ee7b7}
.ob.wa{border-color:var(--no);background:#2e0505;color:#fca5a5}
.ob.lk{cursor:default}
.ex{margin-top:5px;padding:6px;background:#0a1628;border-left:3px solid var(--ac2);border-radius:0 5px 5px 0;font-size:.7rem;line-height:1.3;color:#94a3b8}
.sd{text-align:center;padding:16px;background:var(--card);border-radius:10px;border:1px solid var(--bor);margin-bottom:9px}
.sd .sn{font-size:2rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.sd .sn.p{color:var(--ok)}.sd .sn.f{color:var(--no)}
.sd .sl{color:var(--mut);font-size:.76rem;margin-top:2px}
.sub{background:linear-gradient(135deg,var(--ac2),#5b21b6);border:none;color:#fff;padding:9px 28px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.83rem;font-weight:600;transition:.12s}
.sub:hover{transform:scale(1.02);filter:brightness(1.1)}
.tab-bar{display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:5px 5px 0 0;cursor:pointer;font-family:inherit;font-size:.74rem;font-weight:600;border:1px solid var(--bor);background:var(--card);color:var(--mut);transition:.1s}
.tab:hover{color:var(--txt)}
.tab.active{background:var(--card2);color:var(--ac);border-color:var(--ac)}
.tab-content{display:none}
.tab-content.active{display:block}
.pdf-controls{display:flex;gap:5px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.pdf-ctrl-btn{background:var(--card);border:1px solid var(--bor);color:var(--ac);padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.72rem;transition:.1s;text-decoration:none}
.pdf-ctrl-btn:hover{background:var(--ac2);color:#fff;border-color:var(--ac2)}
.pdf-wrapper{position:relative;width:100%;height:75vh;border:1px solid var(--bor);border-radius:6px;overflow:hidden;background:#1a1a2e}
.pdf-wrapper object,.pdf-wrapper embed{width:100%;height:100%;border:none}
.ch-btn{display:inline-block;padding:4px 9px;margin:2px;border-radius:4px;font-size:.7rem;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--bor);background:var(--card);color:var(--ac);transition:.1s}
.ch-btn:hover,.ch-btn.active{background:var(--ac2);color:#fff;border-color:var(--ac2)}
.pkt-dl{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#065f46,#10b981);color:#fff;padding:5px 11px;border-radius:5px;text-decoration:none;font-size:.72rem;font-weight:600;margin:2px;transition:.1s}
.pkt-dl:hover{filter:brightness(1.15)}
.topo-img{max-width:100%;border:1px solid var(--bor);border-radius:6px;margin:5px 0;cursor:pointer;transition:.2s}
.topo-img:hover{border-color:var(--ac)}
.cfg-box{background:#0f172a;border:1px solid var(--bor);border-radius:6px;padding:9px;margin:5px 0;font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ac);white-space:pre-wrap;max-height:180px;overflow-y:auto;line-height:1.4}
.mm-wrap{background:#0f172a;border:1px solid var(--bor);border-radius:8px;padding:12px;margin-bottom:7px}
.mm-center{font-size:.85rem;font-weight:800;color:var(--ac);text-align:center;padding:7px;background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(124,58,237,.08));border-radius:6px;margin-bottom:10px;border:1px solid var(--ac)}
.mm-branch{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:7px}
.mm-node{background:var(--card);border:1px solid var(--bor);border-radius:6px;padding:7px}
.mm-node h4{font-size:.72rem;font-weight:700;color:var(--ac2);margin-bottom:3px;padding-bottom:2px;border-bottom:1px solid var(--bor)}
.mm-node span{display:block;font-size:.64rem;color:#94a3b8;padding:1px 0 1px 8px;position:relative;line-height:1.25}
.mm-node span::before{content:"→";position:absolute;left:0;color:var(--ac);font-size:.58rem}
.iv-q{background:var(--card);border:1px solid var(--bor);border-radius:6px;margin-bottom:5px;overflow:hidden}
.iv-q .iq{padding:8px 10px;cursor:pointer;font-size:.76rem;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:5px;transition:.1s}
.iv-q .iq:hover{background:var(--card2)}
.iv-q .iq .arrow{color:var(--ac);font-size:.68rem;transition:.2s;flex-shrink:0}
.iv-q .iq .arrow.open{transform:rotate(90deg)}
.iv-q .ia{padding:0 10px;max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.72rem;color:#94a3b8;line-height:1.4}
.iv-q .ia.open{max-height:500px;padding:5px 10px 9px}
.cap-card{background:linear-gradient(135deg,#0f172a,#111827);border:1px solid #1e3a5f;border-radius:8px;padding:12px;margin-bottom:9px}
.cap-card h3{font-size:.85rem;font-weight:700;color:var(--ac);margin-bottom:3px}
.cap-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.cap-meta span{font-size:.62rem;padding:2px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace}
.cap-diff-b{background:#052e1c;color:#6ee7b7;border:1px solid #10b981}
.cap-diff-i{background:#1e1b4b;color:#a5b4fc;border:1px solid #6366f1}
.cap-diff-a{background:#2d0a0a;color:#fca5a5;border:1px solid #ef4444}
.cap-desc{font-size:.74rem;color:#94a3b8;margin-bottom:7px;line-height:1.4}
.cap-req{list-style:none;padding:0}
.cap-req li{font-size:.7rem;color:#cbd5e1;padding:2px 0 2px 13px;position:relative;line-height:1.3}
.cap-req li::before{content:"☐";position:absolute;left:0;color:var(--warn);font-size:.66rem}
.cap-del{font-size:.66rem;color:var(--gold);margin-top:5px;padding-top:5px;border-top:1px solid var(--bor)}

.otj-card h3{font-size:.84rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}

.otj-story{background:#0a1628;border-left:3px solid var(--warn);border-radius:0 5px 5px 0;padding:8px;font-size:.7rem;color:#94a3b8;line-height:1.35;margin-top:6px;font-style:italic}

.bp-pct{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:800;padding:2px 8px;border-radius:4px}
.bp-bar{height:6px;background:var(--bor);border-radius:3px;margin:6px 0;overflow:hidden}
.bp-fill{height:100%;border-radius:3px;transition:.3s}

.sim-gotcha{font-size:.68rem;color:var(--no)}

.job-desc{font-size:.7rem;color:#94a3b8;margin:4px 0 8px;line-height:1.35}
.job-links{display:flex;flex-wrap:wrap;gap:4px}
.job-link{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:4px;font-size:.68rem;font-weight:600;text-decoration:none;border:1px solid var(--bor);background:var(--card2);color:var(--ac);transition:.1s;cursor:pointer}
.job-link:hover{background:var(--ac2);color:#fff;border-color:var(--ac2)}
.region-btn{display:inline-block;padding:5px 12px;margin:2px;border-radius:5px;font-size:.74rem;font-weight:600;cursor:pointer;border:1px solid var(--bor);background:var(--card);color:var(--txt);transition:.1s}
.region-btn:hover,.region-btn.active{background:var(--ac2);color:#fff;border-color:var(--ac2)}
.extra-link{display:block;padding:6px 9px;margin-bottom:3px;border-radius:5px;font-size:.72rem;text-decoration:none;color:var(--ac);border:1px solid var(--bor);background:var(--card);transition:.1s}
.extra-link:hover{background:var(--card2);border-color:var(--ac)}
.region-note{font-size:.64rem;color:var(--mut);margin-top:2px;line-height:1.3}

.resource-card{background:var(--card);border:1px solid var(--bor);border-radius:7px;padding:10px;margin-bottom:6px}

const INTV={
"3":[{q:"Walk me through what happens when PC-A pings PC-B on the same LAN.",a:"PC-A checks its ARP cache for PC-B's MAC address. If not found, it sends an ARP broadcast request. PC-B replies with a unicast ARP response containing its MAC. PC-A then encapsulates the ICMP echo request in an Ethernet frame using PC-B's destination MAC and its own source MAC. The switch learns PC-A's MAC on the ingress port, looks up PC-B's MAC in its MAC address table, and forwards the frame only to the correct port. PC-B processes the ICMP and sends an echo reply following the same process in reverse."}, {q:"How does a switch differ from a hub?",a:"A hub is a Layer 1 device that simply repeats all incoming traffic out every port, creating a single large collision domain and half-duplex operation. A switch is a Layer 2 device that learns MAC addresses, builds a MAC address table, and forwards frames intelligently only to the destination port. Each switch port becomes its own collision domain, supporting full-duplex communication and greatly reducing unnecessary traffic."}],
"4":[{q:"You just consoled into a switch for the first time. Walk through securing it.",a:"From user mode, enter 'enable', then 'configure terminal'. Set 'hostname SecureSwitch'. Create 'enable secret StrongPass123'. Create a local user: 'username admin privilege 15 secret StrongPass123'. Set 'ip domain-name example.com' and generate keys: 'crypto key generate rsa modulus 2048'. On VTY lines: 'line vty 0 15', 'transport input ssh', 'login local'. Enable 'service password-encryption', set a MOTD banner, assign IP to VLAN 1 SVI if needed, set default gateway, then 'copy run start'."}, {q:"Explain the difference between enable password and enable secret.",a:"Enable password is stored in clear text or weakly hashed as Type 7 when service password-encryption is used. Enable secret uses a much stronger MD5 hash (Type 5). If both are configured, the enable secret takes precedence. Best practice is to use only enable secret and avoid enable password entirely for security."}],
"20":[{q:"Design a multi-area OSPF for a company with HQ and 3 branches.",a:"Place the HQ in Area 0 (backbone). Assign each branch its own non-backbone area (Area 1, 2, 3). The routers connecting HQ to branches act as Area Border Routers (ABRs). Use 'area range' commands on ABRs for route summarization to reduce routing table size. Assign stable Router IDs using loopback interfaces. This design provides smaller link-state databases, faster SPF calculations, and controlled summarization at the ABRs."}, {q:"OSPF neighbors stuck in INIT state. What do you check?",a:"Verify that hello and dead timers match, area IDs match, and the subnet mask is correct on the shared link. Check that the interface is not configured as passive. Ensure no ACLs are blocking OSPF multicast addresses 224.0.0.5 and 224.0.0.6. Use 'show ip ospf interface' and 'debug ip ospf adj' for further diagnosis."}],
"33":[{q:"Walk me through configuring SSH and disabling Telnet.",a:"Set 'hostname R1' and 'ip domain-name company.com'. Generate RSA keys with 'crypto key generate rsa modulus 2048'. Force SSH version 2 with 'ip ssh version 2'. Create a local user: 'username admin privilege 15 secret StrongPass'. On VTY lines: 'line vty 0 4', 'transport input ssh', 'login local'. This configuration disables Telnet completely while enabling secure SSH access."}, {q:"A device's password is lost. Walk through recovery.",a:"Connect via console cable. Power cycle the device and send Ctrl+Break (or equivalent) to enter ROMMON mode. Set 'confreg 0x2142' to ignore startup-config, then reset. After boot, enter privileged mode (no password required). Copy startup to running: 'copy start run'. Change the password with 'enable secret NewStrongPass'. Restore normal boot with 'config-register 0x2102'. Save with 'copy run start' and reload."}],
"38":[{q:"Explain SDN simply.",a:"In traditional networking, each device is managed individually via CLI. In SDN, a central controller handles the control plane while network devices focus only on the data plane (forwarding). This separation allows centralized management, better scalability, consistency, and easier automation."}, {q:"Northbound vs southbound APIs?",a:"Southbound APIs are used by the controller to communicate downward to network devices (examples: OpenFlow, NETCONF, RESTCONF). Northbound APIs allow applications and programmers to communicate upward to the controller (typically REST-based). The flow is: applications → northbound → controller → southbound → devices."}, {q:"Ansible vs Puppet vs Chef?",a:"Ansible is agentless, uses SSH and simple YAML playbooks, and pushes configurations — making it the most popular choice for network automation. Puppet and Chef are agent-based, use a pull model, and require agents on devices. Ansible's lack of agent requirement and ease of use make it dominant in networking."}],
"39":[{q:"Secure a new switch from scratch — speed run.",a:"Set hostname, enable secret, create privilege 15 local user. Set domain name, generate 2048-bit RSA keys, enable SSHv2. Configure VTY for SSH only with login local and exec timeout. Set console logging synchronous and timeout. Add MOTD banner and service password-encryption. Disable domain lookup. Assign management IP to VLAN 1 SVI with default gateway. Create VLANs including a black-hole VLAN 999. Set access ports to access mode with port security, PortFast, and BPDU Guard. Set trunks with native VLAN 999, no negotiation, and restricted allowed VLANs. Shut and assign unused ports to VLAN 999. Enable rapid-pvst. Save config."}, {q:"Why black-hole VLAN 999?",a:"By default, unused ports are in VLAN 1, which is a security risk. Placing them in an unused black-hole VLAN like 999 (with no IP address, no DHCP, and not allowed on trunks) means an attacker who plugs into an unused port reaches nothing. This is a CIS benchmark best practice and provides defense-in-depth."}],};

{q:"Walk me through your change management process.",a:"1) Write change request: what, why, impact, steps, test plan, back-out plan. 2) Test in lab. 3) Submit for CAB approval. 4) Execute during maintenance window. 5) Run post-change verification. 6) Document results and update diagrams."}]},
{cat:"Technical — Troubleshooting",qs:[
{q:"A user can't access anything. Walk me through your troubleshooting.",a:"Bottom-up: L1 — check cable, interface lights, 'show interfaces status.' L2 — verify VLAN assignment, MAC in table, trunk allowing VLAN. L3 — check IP/mask/gateway, ping gateway, check routing table. L4+ — check DNS resolution, specific port blocks. Ask: 'What changed recently?'"},
{q:"OSPF neighbors won't form. What do you check?",a:"Must match: hello/dead timers, area ID, subnet mask on shared link, authentication. Must NOT have: passive-interface on connecting interface, ACL blocking multicast 224.0.0.5/6. Commands: 'show ip ospf interface', 'show ip ospf neighbor', 'show run | section ospf'. Common gotcha: MTU mismatch prevents reaching FULL state."},
{q:"Ping works by IP but not by name. Diagnose.",a:"DNS issue. Check: which DNS servers is the client using (ipconfig /all). Can you ping the DNS server by IP? Is DHCP handing out correct DNS (Option 6)? Any ACL blocking UDP 53? Use nslookup for diagnosis."},
{q:"EtherChannel shows SD (suspended). What's wrong?",a:"Member ports don't match. All must be identical: speed, duplex, VLAN assignment, native VLAN, trunk allowed list. Check 'show etherchannel summary' and compare 'show run interface' for each member. Also verify LACP mode — passive+passive won't form."}]},
{cat:"Technical — Design & Config",qs:[
{q:"Design an IP scheme for a company with 4 departments and 500 users.",a:"Use 10.0.0.0/8 private space. Assign /22 per department for growth: Dept A 10.10.0.0/22 (1022 hosts), Dept B 10.10.4.0/22, Dept C 10.10.8.0/22, Dept D 10.10.12.0/22. Management VLAN: 10.10.100.0/24. Servers: 10.10.200.0/24. Point-to-point links: /30s."},
{q:"How would you secure a Cisco switch from scratch?",a:"Hostname, enable secret, local user privilege 15. RSA keys 2048-bit, SSH v2, transport input ssh on VTY. Service password-encryption, banner motd. Port security on access ports (max 2, sticky, shutdown). DHCP snooping and DAI. Disable unused ports. Native VLAN to unused VLAN. BPDU Guard on PortFast ports."},
{q:"Walk me through configuring PAT.",a:"1) ip nat inside on LAN-facing. ip nat outside on WAN-facing. 2) ACL matching internal subnets: 'access-list 1 permit 10.0.0.0 0.0.255.255'. 3) 'ip nat inside source list 1 interface Gi0/0 overload'. 4) Verify: 'show ip nat translations'."}]},
{cat:"Situational — Real World",qs:[
{q:"You inherit a network with zero documentation. What do you do first?",a:"Start with CDP/LLDP: 'show cdp neighbors detail' on every device for connections, IPs, platforms. Draw physical topology. 'show ip route' on routers for L3. 'show vlan brief' and 'show interfaces trunk' for L2. 'show ip interface brief' for all IPs. 'show run' to capture configs. Set up SNMP monitoring. Document everything."},
{q:"A rushed emergency change is needed. How do you handle it?",a:"Even under pressure: document what/why/back-out plan. Get verbal approval from on-call manager. Execute carefully. Run post-change verification. Document immediately after. Emergency changes get scrutinized in post-incident reviews — documentation protects you."}]},

{q:"Which is NOT a valid IPv6 address type?",o:["Unicast","Multicast","Broadcast","Anycast"],a:2,e:"IPv6 does not support broadcast. It uses multicast and anycast instead."},
{q:"Class B range starts at which first octet?",o:["1","128","192","224"],a:1,e:"Class A: 1-126, Class B: 128-191, Class C: 192-223, Class D: 224-239."},
{q:"The first 24 bits of a MAC address represent what?",o:["Device serial number","OUI (manufacturer ID)","Interface identifier","VLAN tag"],a:1,e:"The OUI identifies the NIC manufacturer."}]},
{id:8,name:"Subnetting",q:[
{q:"How many subnets does a /28 create from a /24?",o:["4","8","16","32"],a:2,e:"From /24 to /28 = 4 additional bits = 2^4 = 16 subnets."},
{q:"What is the subnet mask for /20?",o:["255.255.240.0","255.255.248.0","255.255.224.0","255.255.252.0"],a:0,e:"/20 = 255.255.240.0."},
{q:"How many usable hosts in a /26?",o:["30","62","64","126"],a:1,e:"2^6=64 total - 2 = 62 usable hosts per /26 subnet."},
{q:"/30 is typically used for what?",o:["Server farms","Point-to-point links","Wireless networks","Guest VLANs"],a:1,e:"/30 provides 4 IPs, 2 usable — designed for point-to-point router links."},
{q:"192.168.10.130/25 belongs to which subnet?",o:["192.168.10.0","192.168.10.64","192.168.10.128","192.168.10.192"],a:2,e:"/25 splits into .0-.127 and .128-.255. Address .130 is in the .128 subnet."},
{q:"CIDR notation /22 equals which subnet mask?",o:["255.255.248.0","255.255.252.0","255.255.254.0","255.255.240.0"],a:1,e:"/22 = 22 bits network = 255.255.252.0."},
{q:"Subnet for exactly 6 devices with least waste?",o:["/27","/28","/29","/30"],a:2,e:"/29=8 total, 6 usable. Perfect fit."},
{q:"VLSM allows what?",o:["Single subnet mask for all subnets","Different subnet masks within same network","Only /24 masks","IPv6 addressing only"],a:1,e:"VLSM = Variable Length Subnet Masking — different-sized subnets within the same network."},
{q:"What is supernetting?",o:["Dividing a network into smaller subnets","Combining multiple subnets into a single larger route","Converting IPv4 to IPv6","Assigning private IPs"],a:1,e:"Supernetting combines multiple contiguous subnets into a single route advertisement."},
{q:"10.0.0.0/8 — how many total host addresses?",o:["256","65,534","16,777,214","16,777,216"],a:2,e:"2^24 = 16,777,216 total - 2 = 16,777,214 usable host addresses."}]},
{id:9,name:"OSI Layer 2 - The Data-Link Layer",q:[
{q:"Switch receives unknown unicast. What does it do?",o:["Drops it","Queries other switches","Forwards to gateway","Floods all ports except ingress"],a:3,e:"Unknown unicast → flood all ports except source to ensure delivery."},
{q:"What triggers a switch to update its MAC address table?",o:["Receiving an ARP reply","Examining the source MAC of received frames","Running STP calculations","Receiving a BPDU"],a:1,e:"Switches learn by recording the source MAC address and the port it arrived on."},
{q:"Store-and-forward switching does what before forwarding?",o:["Reads only destination MAC","Receives entire frame and checks CRC","Reads first 64 bytes","Forwards immediately"],a:1,e:"Store-and-forward receives the entire frame, checks CRC for errors, then forwards."},
{q:"What is the purpose of the preamble in an Ethernet frame?",o:["Error detection","Synchronization of receiver clock","VLAN identification","Source identification"],a:1,e:"The 7-byte preamble provides clock synchronization for the receiving device."},
{q:"Which Layer 2 protocol prevents loops?",o:["ARP","STP","VTP","DTP"],a:1,e:"STP (Spanning Tree Protocol) prevents Layer 2 loops by blocking redundant paths."},
{q:"What happens when a switch's MAC table is full?",o:["Drops all new frames","Floods all frames like a hub","Sends error to admin","Clears oldest entries only"],a:1,e:"When the MAC table (CAM) is full, the switch floods all frames — behaving like a hub."},
{q:"Default MAC address table aging time?",o:["30 seconds","60 seconds","300 seconds","600 seconds"],a:2,e:"Default MAC aging time is 300 seconds (5 minutes)."},
{q:"Cut-through switching reads how many bytes before forwarding?",o:["6 bytes (dest MAC)","14 bytes","64 bytes","512 bytes"],a:0,e:"Cut-through reads only the destination MAC (6 bytes) and immediately begins forwarding."},
{q:"Which 802.1Q field adds a 4-byte VLAN tag?",o:["Preamble extension","4-byte VLAN tag between source MAC and EtherType","FCS modification","MAC extension"],a:1,e:"802.1Q inserts a 4-byte VLAN tag between the source MAC and EtherType fields."},
{q:"Each switch port is its own what?",o:["Broadcast domain","Collision domain","VLAN","Subnet"],a:1,e:"Each switch port = separate collision domain. VLANs define broadcast domains."}]},
{id:10,name:"OSI Layer 1 - The Physical Layer",q:[
{q:"10GBASE-ER supports what distance?",o:["300m","10km","40km","100km"],a:2,e:"10GBASE-ER = 40km on single-mode fiber at 10 Gbps."},
{q:"10GBASE-LR supports what max distance?",o:["300m","550m","10km","40km"],a:2,e:"10GBASE-LR = 10km on single-mode fiber."},
{q:"Cat5e cable supports which maximum speed?",o:["100 Mbps","1 Gbps","10 Gbps","40 Gbps"],a:1,e:"Cat5e supports up to 1 Gbps at 100m."},
{q:"What is Auto-MDIX?",o:["Automatic VLAN assignment","Automatic cable type detection and adjustment","Automatic duplex negotiation","Automatic IP assignment"],a:1,e:"Auto-MDIX detects cable type and adjusts automatically."},
{q:"Which standard defines PoE+ with up to 30W per port?",o:["802.3af","802.3at","802.3bt","802.3ad"],a:1,e:"802.3af = 15.4W, 802.3at (PoE+) = 30W, 802.3bt (PoE++) = up to 90W."},
{q:"What type of cable connects a switch to another switch (old standard)?",o:["Straight-through","Crossover","Rollover","Console"],a:1,e:"Crossover cables connect like devices. Modern devices use Auto-MDIX."},
{q:"What cable connects a PC to a switch?",o:["Straight-through","Crossover","Rollover","Coaxial"],a:0,e:"Straight-through cables connect unlike devices (PC to switch)."},
{q:"Full-duplex means what?",o:["Only one direction at a time","Simultaneous send and receive","Half the bandwidth","Only receiving"],a:1,e:"Full-duplex = simultaneous bidirectional communication."},
{q:"Cat6a supports 10 Gbps at what maximum distance?",o:["55m","100m","300m","550m"],a:1,e:"Cat6a supports 10 Gbps at up to 100m. Cat6 only at 55m."},
{q:"Excessive CRC errors indicate what?",o:["Faulty cabling or physical issue","VLAN mismatch","Duplex mismatch","Broadcast storm"],a:0,e:"CRC errors typically indicate physical issues: bad cables, connectors, or EMI."}]},
{id:11,name:"Cisco Device Functions",q:[
{q:"A Layer 3 switch combines what two device functions?",o:["Hub and switch","Switch and router","Router and firewall","Switch and access point"],a:1,e:"Layer 3 switches perform both Layer 2 switching and Layer 3 routing."},
{q:"A hub operates at which OSI layer?",o:["Layer 1","Layer 2","Layer 3","Layer 4"],a:0,e:"Hubs are Layer 1 devices — they simply repeat electrical signals to all ports."},
{q:"Which Cisco feature discovers directly connected neighbors?",o:["ARP","CDP","STP","VTP"],a:1,e:"CDP (Cisco Discovery Protocol) discovers directly connected Cisco devices."},
{q:"What does a wireless access point function as?",o:["Layer 1 repeater","Layer 2 bridge between wired and wireless","Layer 3 router","Layer 4 gateway"],a:1,e:"An AP bridges wireless clients to the wired network at Layer 2."},
{q:"LLDP is the standard equivalent of which Cisco protocol?",o:["VTP","DTP","CDP","PAgP"],a:2,e:"LLDP (Link Layer Discovery Protocol) is the IEEE standard equivalent of CDP."},
{q:"Which campus layer connects directly to endpoints?",o:["Core","Distribution","Access","Backbone"],a:2,e:"Access layer connects directly to end devices (PCs, phones, printers)."},
{q:"SVIs provide what capability on a Layer 3 switch?",o:["Spanning tree","Inter-VLAN routing","Port mirroring","Link aggregation"],a:1,e:"Switch Virtual Interfaces enable inter-VLAN routing directly on a Layer 3 switch."},
{q:"What does a hub do with a received frame?",o:["Forwards to destination only","Floods to all ports including source","Floods to all ports except source","Drops it"],a:2,e:"Hubs flood frames to all ports except the source — no intelligence about MAC addresses."},
{q:"Which command shows CDP neighbor details including IP?",o:["show cdp","show cdp neighbors detail","show neighbors","show lldp"],a:1,e:"'show cdp neighbors detail' shows connected Cisco devices with IPs, platform, and capabilities."},
{q:"VLANs reduce what in a Layer 2 network?",o:["Collision domains","Broadcast domain size","Cable length","Bandwidth"],a:1,e:"VLANs segment broadcast domains, reducing broadcast traffic scope."}]},
{id:20,name:"OSPF",q:[
{q:"OSPF uses which algorithm?",o:["Bellman-Ford","Dijkstra SPF","DUAL","Path vector"],a:1,e:"OSPF uses Dijkstra's Shortest Path First algorithm."},
{q:"What is the OSPF cost formula?",o:["Hop count","Reference bandwidth / interface bandwidth","Delay * bandwidth","MTU / bandwidth"],a:1,e:"Cost = Reference BW (default 100 Mbps) / Interface BW."},
{q:"OSPF hello interval default on broadcast networks?",o:["5 seconds","10 seconds","30 seconds","40 seconds"],a:1,e:"OSPF hello=10 seconds on broadcast. Dead=40 seconds (4x hello)."},
{q:"Which LSA type do ABRs generate for inter-area routes?",o:["Type 3","Type 1","Type 2","Type 4"],a:0,e:"Type 3 Summary LSAs advertise routes between OSPF areas."},
{q:"OSPF area 0 is called what?",o:["Stub area","Backbone area","Transit area","NSSA"],a:1,e:"Area 0 is the backbone — all other areas must connect to it."},
{q:"DR/BDR election: what wins?",o:["Highest IP","Lowest priority","Highest priority, then highest RID","Lowest RID"],a:2,e:"Highest priority wins (default=1). Tiebreaker: highest Router ID."},
{q:"OSPF neighbor stuck in INIT. Likely cause?",o:["Mismatched subnet masks","No authentication","Wrong network types","Bad MTU"],a:0,e:"Mismatched masks prevent INIT→2-Way transition."},
{q:"'default-information originate' does what?",o:["Sets OSPF cost","Injects a default route into OSPF","Changes hello timers","Sets the router ID"],a:1,e:"Injects the default route (0.0.0.0/0) into OSPF so all routers learn it."},
{q:"Which command changes OSPF cost on an interface?",o:["ip ospf priority","ip ospf cost <value>","ip ospf hello-interval","ip ospf network"],a:1,e:"'ip ospf cost <value>' manually sets the OSPF cost for that interface."},
{q:"OSPF 2-Way/DROTHER state on broadcast network means?",o:["Master/Slave negotiated","No bidirectional communication","Bidirectional established; neighbor is not DR/BDR","Electing new DR"],a:2,e:"Normal state for non-DR/BDR neighbors on broadcast networks."}]},
{id:22,name:"VLAN & Inter-VLAN Routing",q:[
{q:"Router-on-a-Stick requires what on the switch port?",o:["Access mode","Trunk mode","EtherChannel","Port security"],a:1,e:"The switch port connecting to the router must be a trunk to carry multiple VLANs."},
{q:"Which command creates a subinterface on a router?",o:["interface vlan 10","interface gig0/0.10","interface gig0/0 vlan 10","vlan 10 interface gig0/0"],a:1,e:"'interface gig0/0.10' creates subinterface .10 on physical interface gig0/0."},
{q:"SVI requires what global command to enable routing?",o:["ip routing","router ospf 1","interface vlan","sdm prefer"],a:0,e:"'ip routing' must be enabled globally on a Layer 3 switch for SVIs to route between VLANs."},
{q:"Native VLAN mismatch causes what?",o:["Misdirected untagged frames, VLAN hopping risk","Error logged, traffic fine","DTP negotiates correct VLAN","STP blocks the port"],a:0,e:"Native VLAN mismatch causes untagged traffic problems and security risks."},
{q:"What does 'switchport voice vlan' do?",o:["Enables VTP","Enables PoE","Sets VLAN for IP phones","Configures QoS"],a:2,e:"Assigns a dedicated voice VLAN separate from data VLAN."},
{q:"VTP Transparent mode: what does the switch do?",o:["Advertises and syncs VLANs","Only syncs","Doesn't participate but forwards VTP ads","Blocks all VTP"],a:2,e:"Transparent mode doesn't advertise or sync but forwards VTP messages to neighbors."},
{q:"Which is more efficient for inter-VLAN routing?",o:["Router-on-a-stick","Layer 3 switch","They're equal","Depends on cable type"],a:1,e:"Layer 3 switches route in hardware (ASICs) — much faster than router-on-a-stick."},
{q:"'switchport trunk allowed vlan' command purpose?",o:["Enable trunk mode","Limit VLANs on a trunk port","Set native VLAN","Configure voice VLAN"],a:1,e:"Restricts which VLANs can traverse a specific trunk port."},
{q:"VTP Client mode — can you create VLANs locally?",o:["Yes","No","Only extended VLANs","Only with password"],a:1,e:"VTP Client cannot create, modify, or delete VLANs — it only receives from the server."},
{q:"On a subinterface, which command specifies the VLAN?",o:["switchport access vlan 10","encapsulation dot1Q 10","vlan 10","switchport trunk allowed vlan 10"],a:1,e:"'encapsulation dot1Q <VLAN-ID>' on a subinterface specifies which VLAN it handles."}]},
{id:23,name:"DHCP",q:[
{q:"DORA process order?",o:["Discover, Offer, Request, Acknowledge","Discover, Offer, Acknowledge, Request","Request, Offer, Discover, Acknowledge","Offer, Discover, Request, Acknowledge"],a:0,e:"DORA: Discover→Offer→Request→Acknowledge."},
{q:"DHCP relay command on Cisco?",o:["dhcp-relay","ip helper-address <server-IP>","relay-helper","dhcp forward"],a:1,e:"'ip helper-address' on the interface forwards DHCP broadcasts to the specified server."},
{q:"Option 6 specifies what?",o:["TFTP server","Option 82 info","Vendor info","DNS server"],a:3,e:"Option 6 = DNS server addresses."},
{q:"'ip dhcp excluded-address' does what?",o:["Creates pool","Excludes addresses from dynamic assignment","Sets gateway","Configures DNS"],a:1,e:"Prevents specified range from being assigned to DHCP clients."},
{q:"DHCP snooping drops DHCPOFFER from untrusted port. Why?",o:["Port is down","Prevents rogue DHCP servers","Frame too large","Wrong VLAN"],a:1,e:"Untrusted ports shouldn't send DHCP server messages."},
{q:"Option 3 assigns what?",o:["WINS server","Default gateway","DNS domain","DNS server"],a:1,e:"Option 3 = Default router (gateway) for DHCP clients."},
{q:"DHCP starvation attack: what does the attacker do?",o:["Spoofs DNS","Exhausts all available IPs with fake requests","Modifies DHCP packets","Blocks DHCP traffic"],a:1,e:"Attacker sends massive DHCPDISCOVER with spoofed MACs, exhausting the IP pool."},
{q:"Which prevents DHCP starvation?",o:["Port security limiting MAC addresses","DAI","ACLs","NAT"],a:0,e:"Port security limits MACs per port, preventing mass spoofed DHCP requests."},
{q:"'ip dhcp snooping trust' on a port means what?",o:["Port is untrusted","Port is trusted for DHCP server messages","DHCP is disabled","Port is shut down"],a:1,e:"Trusted ports allow DHCP server messages (OFFER, ACK)."},
{q:"Best practice for consistent printer IP?",o:["Static IP","Longer lease time","Dynamic DNS","DHCP reservation for printer MAC"],a:3,e:"DHCP reservation ties a specific IP to a MAC address permanently."}]},
{id:24,name:"HSRP",q:[
{q:"Default HSRP priority?",o:["50","100","110","255"],a:1,e:"HSRP default priority=100. Higher priority = preferred Active router."},
{q:"HSRP hello and hold timers default?",o:["3 sec hello, 10 sec hold","5 sec hello, 15 sec hold","10 sec hello, 30 sec hold","1 sec hello, 3 sec hold"],a:0,e:"Default: hello=3 seconds, hold=10 seconds."},
{q:"'standby 1 preempt' purpose?",o:["Sets priority","Allows higher-priority router to take over as Active","Sets virtual IP","Configures timers"],a:1,e:"Without preempt, a higher-priority router won't take over from the current Active."},
{q:"HSRP Active router fails. What takes over?",o:["Nothing — traffic stops","Standby router becomes Active","All routers renegotiate","Switch takes over routing"],a:1,e:"The Standby router immediately becomes the Active router."},
{q:"How many Active routers per HSRP group?",o:["1","2","Unlimited","Depends on priority"],a:0,e:"Only one Active router per HSRP group at any time."},
{q:"VRRP is the standards-based equivalent of what?",o:["STP","HSRP","VTP","LACP"],a:1,e:"VRRP is the IEEE standard version of Cisco's HSRP."},
{q:"GLBP differs from HSRP how?",o:["GLBP is Layer 3 only","GLBP provides load balancing across multiple routers","GLBP doesn't support preemption","GLBP is standards-based"],a:1,e:"GLBP allows multiple routers to actively forward traffic — load balancing."},
{q:"If preempt is NOT configured and original Active recovers?",o:["It becomes Active again","It stays in Standby","It becomes Standby","Network goes down"],a:1,e:"Without preempt, the recovered router stays in Standby."},
{q:"HSRP v2 supports what that v1 doesn't?",o:["Virtual IPs","More group numbers (0-4095) and IPv6","Preemption","Tracking"],a:1,e:"HSRP v2 supports groups 0-4095 (v1=0-255) and IPv6."},
{q:"'standby 1 track' does what?",o:["Tracks NTP sync","Adjusts priority based on tracked interface state","Tracks neighbors","Monitors bandwidth"],a:1,e:"Interface tracking decrements HSRP priority if a tracked interface goes down."}]},
{id:25,name:"STP",q:[
{q:"STP prevents what?",o:["IP conflicts","Layer 2 loops","Routing loops","VLAN hopping"],a:1,e:"STP prevents Layer 2 loops by blocking redundant paths."},
{q:"Root bridge elected based on what?",o:["Highest priority","Lowest Bridge ID (priority + MAC)","Most ports","Fastest interfaces"],a:1,e:"Lowest Bridge ID wins. Bridge ID = priority (default 32768) + system MAC."},
{q:"STP port states in 802.1D?",o:["Blocking, Listening, Learning, Forwarding, Disabled","Discarding, Learning, Forwarding","Active, Standby","Init, 2-Way, Full"],a:0,e:"802.1D states: Blocking→Listening→Learning→Forwarding."},
{q:"RSTP port states?",o:["Blocking, Listening, Learning, Forwarding","Discarding, Learning, Forwarding","Active, Passive","Init, Full"],a:1,e:"RSTP simplifies to 3 states: Discarding, Learning, Forwarding."},
{q:"PortFast does what?",o:["Speeds up routing","Skips Listening/Learning, goes directly to Forwarding","Disables STP","Creates a trunk"],a:1,e:"PortFast immediately transitions an access port to Forwarding — for end devices only."},
{q:"BPDU Guard does what?",o:["Forwards BPDUs","Shuts down port if BPDU is received","Creates BPDUs","Filters BPDUs"],a:1,e:"BPDU Guard protects PortFast ports — if a BPDU arrives, the port is err-disabled."},
{q:"Root Guard prevents what?",o:["Root bridge changes on protected port","BPDUs on access ports","MAC flooding","VLAN hopping"],a:0,e:"Root Guard prevents a port from becoming root port."},
{q:"STP convergence time in 802.1D?",o:["1-2 seconds","15-20 seconds","30-50 seconds","2-5 minutes"],a:2,e:"802.1D convergence: ~30-50 seconds."},
{q:"RSTP convergence time?",o:["30-50 seconds","15 seconds","Sub-second to a few seconds","5 minutes"],a:2,e:"RSTP converges in sub-second to a few seconds."},
{q:"Rapid PVST+ command?",o:["spanning-tree mode rapid-pvst","spanning-tree mode rst","spanning-tree mode pvst","spanning-tree mode mst"],a:0,e:"'spanning-tree mode rapid-pvst' enables Rapid PVST on Cisco switches."}]},
{id:26,name:"EtherChannel",q:[
{q:"Maximum links in an EtherChannel?",o:["2","4","8","16"],a:2,e:"Up to 8 active links per EtherChannel."},
{q:"LACP modes are what?",o:["Desirable and auto","Active and passive","On and off","Master and slave"],a:1,e:"LACP: Active (initiates) and Passive (waits)."},
{q:"PAgP modes are what?",o:["Active and passive","Desirable and auto","On and off","Master and slave"],a:1,e:"PAgP: Desirable (initiates) and Auto (waits)."},
{q:"'channel-group 1 mode on' does what?",o:["Forces EtherChannel without negotiation","Uses LACP","Uses PAgP","Disables EtherChannel"],a:0,e:"'on' mode forces EtherChannel without LACP or PAgP negotiation."},
{q:"What must match across all EtherChannel member ports?",o:["Only speed","Only VLAN","Speed, duplex, VLAN, trunk settings","Only duplex"],a:2,e:"All members must have matching speed, duplex, VLAN assignments, and trunk configuration."},
{q:"Which command shows EtherChannel summary?",o:["show etherchannel","show etherchannel summary","show interface port-channel","show lacp"],a:1,e:"'show etherchannel summary' shows all channel groups, member ports, and status."},
{q:"Port-channel interface is physical or logical?",o:["Physical","Logical","Both","Neither"],a:1,e:"Port-channel is a logical interface representing the bundled physical links."},
{q:"Load balancing in EtherChannel is based on what?",o:["Round-robin per packet","Hash of source/destination MAC or IP","Random selection","Packet size"],a:1,e:"EtherChannel load balancing uses a hash algorithm on MAC addresses, IPs, or ports."},
{q:"LACP can have how many standby links?",o:["0","4","8","16"],a:2,e:"LACP supports 8 active + 8 standby (hot standby) links per channel."},
{q:"Can you mix speeds in an EtherChannel?",o:["Yes","No — all links must be same speed","Only with LACP","Only in Layer 3 mode"],a:1,e:"All member links must be the same speed and duplex."}]},
{id:27,name:"Port Security",q:[
{q:"Port Security 'Restrict' violation mode: what happens?",o:["Port shuts down","Drops violating packets, logs, keeps port active","Drops silently","Port enters err-disabled"],a:1,e:"Restrict = drop + log + increment counter. Port stays active."},
{q:"'Shutdown' violation mode: result?",o:["Err-disabled state immediately","Drops packets quietly","Logs only","Port flaps"],a:0,e:"Shutdown immediately puts the port in err-disabled state."},
{q:"DAI validates ARP against what?",o:["Routing table","DHCP snooping bindings","Static ARP entries only","DNS cache"],a:1,e:"DAI checks ARP packets against the DHCP snooping binding table."},
{q:"VLAN hopping prevention on trunks — set native VLAN to?",o:["VLAN 1","Management VLAN","Unused VLAN (e.g., 999)","Voice VLAN"],a:2,e:"Using an unused native VLAN prevents double-tagging VLAN hopping attacks."},
{q:"802.1X components: supplicant, authenticator, and?",o:["Switch","Authentication server (RADIUS)","Firewall","DNS server"],a:1,e:"The three 802.1X components: supplicant (client), authenticator (switch/AP), auth server (RADIUS)."},
{q:"'errdisable recovery' does what?",o:["Prevents err-disable","Auto-re-enables err-disabled ports after timer","Clears MAC table","Resets port security"],a:1,e:"Automatically re-enables err-disabled ports after a configured interval."},
{q:"DHCP Snooping prevents what?",o:["ARP spoofing","Rogue DHCP servers and starvation","MAC flooding","IP spoofing"],a:1,e:"Filters untrusted DHCP messages, prevents rogue DHCP and starvation attacks."},
{q:"Port must be in what mode before enabling port security?",o:["Trunk","Access","Dynamic auto","Dynamic desirable"],a:1,e:"Port security requires the port to be in access mode first."},
{q:"Sticky MACs do what?",o:["Require manual MAC entry","Dynamically learn and save MACs to running-config","Never expire","Only work with 802.1X"],a:1,e:"Sticky MACs are dynamically learned and saved to the running-config."},
{q:"IP Source Guard prevents what?",o:["DHCP starvation","IP address spoofing","ARP spoofing","VLAN hopping"],a:1,e:"IP Source Guard validates source IP against DHCP snooping bindings."}]},
{id:28,name:"ACLs",q:[
{q:"Standard ACLs filter on what?",o:["Source IP only","Source and destination IP","Source IP and port","Destination IP only"],a:0,e:"Standard ACLs filter based on source IP address only."},
{q:"Where should standard ACLs be placed?",o:["Close to source","Close to destination","On trunk ports","On loopback interfaces"],a:1,e:"Standard ACLs near destination since they only match source IP."},
{q:"Where should extended ACLs be placed?",o:["Close to source","Close to destination","On management interfaces","On trunk ports"],a:0,e:"Extended ACLs near source to prevent unwanted traffic early."},
{q:"What is the implicit deny at the end of every ACL?",o:["permit any","deny any any","log all","No implicit rule"],a:1,e:"Every ACL has an invisible 'deny any any' at the end."},
{q:"ACL 1-99 is what type?",o:["Extended","Standard","Named","IPv6"],a:1,e:"1-99 (and 1300-1999) = Standard. 100-199 (and 2000-2699) = Extended."},
{q:"Which command applies ACL 10 inbound on an interface?",o:["ip access-group 10 in","ip access-list 10 in","access-class 10 in","access-group 10 in"],a:0,e:"'ip access-group <ACL> in/out' applies an ACL to an interface."},
{q:"'access-class' is used to apply ACLs where?",o:["Interfaces","VTY lines for SSH/Telnet access","VLANs","Routing protocols"],a:1,e:"'access-class' applies ACLs to VTY lines."},
{q:"Wildcard mask 0.0.0.0 means what?",o:["Match any IP","Match exact IP (host)","Match entire subnet","Invalid mask"],a:1,e:"0.0.0.0 = all bits must match exactly. Equivalent to 'host' keyword."},
{q:"Named ACL advantage over numbered?",o:["Faster processing","Can edit individual entries without recreating","More secure","Supports IPv6 only"],a:1,e:"Named ACLs allow inserting, deleting, and editing individual entries without rebuilding."},
{q:"ACL processing: top-down, first match. What happens after a match?",o:["Continue checking remaining rules","Stop processing, apply matched rule action","Log and continue","Skip to next interface"],a:1,e:"ACL processing stops at the first match. Remaining rules are not checked."}]},
{id:29,name:"NAT",q:[
{q:"PAT command with 'overload' keyword?",o:["ip nat pool","ip nat inside source list <ACL> interface <intf> overload","ip nat outside source","ip nat inside source static"],a:1,e:"'overload' enables PAT — many-to-one mapping using port numbers."},
{q:"Static NAT — what does it create?",o:["Dynamic pool mapping","Outside-to-inside mapping","Permanent bidirectional 1:1 mapping","PAT for multiple addresses"],a:2,e:"Static NAT = permanent 1:1 bidirectional mapping."},
{q:"Inside local address is what?",o:["Public IP on the internet","Private IP on internal network before translation","Public IP after translation","IP on the outside interface"],a:1,e:"Inside local = private IP on the internal network (before NAT)."},
{q:"'ip nat inside' is configured on which interface?",o:["WAN-facing interface","LAN-facing interface","Loopback interface","Management interface"],a:1,e:"'ip nat inside' goes on the internal (LAN) interface."},
{q:"NAT pool exhaustion: what happens to new connections?",o:["Connections succeed anyway","New connections are dropped","NAT creates temporary mappings","Traffic is queued"],a:1,e:"When the NAT pool is exhausted, new connections fail."},
{q:"Which command shows active NAT translations?",o:["show ip nat statistics","show ip nat translations","show ip route","show ip interface"],a:1,e:"'show ip nat translations' displays all current NAT mappings."},
{q:"PAT uses what to distinguish connections?",o:["Different public IPs","Port numbers","MAC addresses","VLAN tags"],a:1,e:"PAT assigns unique port numbers to each connection sharing the same public IP."},
{q:"NAT64 enables what?",o:["IPv4 to IPv4 translation","IPv6 clients communicating with IPv4 servers","IPv4 clients communicating with IPv6 servers","Dual-stack routing"],a:1,e:"NAT64 translates IPv6→IPv4, enabling IPv6-only clients to reach IPv4-only servers."},
{q:"'clear ip nat translation *' does what?",o:["Removes all dynamic NAT entries","Removes static entries","Removes all entries including static","Reloads NAT"],a:0,e:"'clear ip nat translation *' removes all dynamic NAT entries (static entries remain)."},
{q:"Inside global address is what?",o:["Private IP","Public IP representing internal host to outside world","External server IP","Gateway IP"],a:1,e:"Inside global = public IP that the internal host is translated to."}]},
{id:30,name:"IPv6",q:[
{q:"NOT a valid IPv6 address type?",o:["Multicast","Unicast","Broadcast","Anycast"],a:2,e:"IPv6 does not support broadcast."},
{q:"All-nodes multicast?",o:["FF02::2","FF02::5","FF02::1","FF02::A"],a:2,e:"FF02::1 = all nodes on local link."},
{q:"GUA prefix?",o:["FC00::/7","FF00::/8","2000::/3","FE80::/10"],a:2,e:"Global Unicast Address prefix = 2000::/3."},
{q:"ULA prefix?",o:["2000::/3","FE80::/10","FC00::/7","FF00::/8"],a:2,e:"Unique Local Address prefix = FC00::/7."},
{q:"Router Solicitation purpose?",o:["Request network prefixes from router","Announce router","NDP neighbor solicitation","Get gateway IP"],a:0,e:"RS prompts routers to send Router Advertisements with prefix info."},
{q:"SLAAC does what?",o:["Assigns static IPs","Auto-generates global unicast addresses from prefix + interface ID","Replaces DNS","Encrypts IPv6 traffic"],a:1,e:"SLAAC combines router prefix + interface ID for automatic addressing."},

{id:33,name:"Cisco Device Security",q:[
{q:"TACACS+ vs RADIUS: encryption difference?",o:["Both encrypt everything","TACACS+ encrypts entire packet; RADIUS only password","RADIUS encrypts everything","Neither encrypts"],a:1,e:"TACACS+ encrypts the full packet body. RADIUS only encrypts the password field."},
{q:"AAA stands for?",o:["Access, Audit, Alert","Authentication, Authorization, Accounting","Automated Access Administration","Address Assignment Authority"],a:1,e:"Authentication (who), Authorization (what access), Accounting (tracking activity)."},
{q:"DMZ purpose?",o:["Internal security","Buffer between internal and external networks","VPN termination","Bandwidth management"],a:1,e:"DMZ hosts external-facing services while protecting the internal network."},
{q:"IPS does what that IDS doesn't?",o:["Monitors traffic","Actively blocks malicious traffic inline","Generates logs","Sends alerts"],a:1,e:"IPS blocks threats inline. IDS only detects and alerts."},
{q:"802.1X components: supplicant, authenticator, and?",o:["Switch","Authentication server (RADIUS)","Firewall","DNS server"],a:1,e:"Supplicant (client), authenticator (switch/AP), authentication server (RADIUS)."},
{q:"RADIUS uses which ports?",o:["TCP 49","UDP 1812/1813","TCP 1812/1813","UDP 49"],a:1,e:"RADIUS uses UDP 1812 (auth) and 1813 (accounting)."},
{q:"TACACS+ uses which port?",o:["UDP 1812","TCP 49","UDP 49","TCP 1812"],a:1,e:"TACACS+ uses TCP port 49."},
{q:"'login local' on VTY lines means what?",o:["No authentication","Use local username/password database","Use RADIUS","Use TACACS+"],a:1,e:"'login local' authenticates against locally configured usernames and passwords."},
{q:"EAP-TLS requires what on both client and server?",o:["Passwords only","Digital certificates","MAC addresses","Pre-shared keys"],a:1,e:"EAP-TLS requires certificates on both sides — most secure but most complex."},
{q:"Banner motd purpose?",o:["Configure hostname","Display legal notice/warning before login","Set timezone","Enable logging"],a:1,e:"Message of the Day banner displays legal warnings to anyone accessing the device."}]},

{q:"Which command generates RSA keys for SSH?",o:["crypto key generate rsa","ssh key generate","enable ssh","ip ssh rsa"],a:0,e:"'crypto key generate rsa' creates the RSA key pair needed for SSH."},
{q:"SSH requires what before key generation?",o:["IP address only","Hostname and domain name configured","VLAN configured","OSPF enabled"],a:1,e:"SSH key generation requires both hostname and domain name to be set."},

{id:35,name:"QoS",q:[
{q:"LLQ provides what for VoIP?",o:["Best effort delivery","Low-latency strict priority queue","Random early detection","Traffic shaping only"],a:1,e:"LLQ = strict priority queuing for guaranteed low-latency VoIP treatment."},
{q:"DSCP stands for?",o:["Dynamic Source Control Protocol","Differentiated Services Code Point","Data Service Configuration Parameter","Distributed Switching Control Plane"],a:1,e:"DSCP = 6-bit field in IP header for traffic classification."},
{q:"Which DSCP value is used for voice (EF)?",o:["0","26","34","46"],a:3,e:"Expedited Forwarding (EF) = DSCP 46. Used for real-time voice traffic."},
{q:"Traffic shaping vs policing: key difference?",o:["No difference","Shaping buffers excess; policing drops excess","Shaping drops; policing buffers","Only policing supports QoS"],a:1,e:"Shaping delays/buffers excess traffic. Policing drops or re-marks excess traffic immediately."},
{q:"CoS (Class of Service) operates at which layer?",o:["Layer 1","Layer 2 (802.1Q PCP field)","Layer 3","Layer 4"],a:1,e:"CoS is a 3-bit field in the 802.1Q tag — Layer 2 QoS marking."},
{q:"DSCP operates at which layer?",o:["Layer 2","Layer 3 (IP header)","Layer 4","Layer 7"],a:1,e:"DSCP is in the IP header's ToS byte — Layer 3 QoS marking."},
{q:"Which queuing method is default?",o:["LLQ","CBWFQ","WFQ","FIFO"],a:3,e:"FIFO (First In, First Out) is the default — no prioritization."},
{q:"Voice QoS requirements: latency?",o:["<500ms","<150ms","<30ms","<1ms"],a:1,e:"Voice requires <150ms latency, <30ms jitter, <1% packet loss."},
{q:"What does WRED do?",o:["Prevents all drops","Selectively drops packets before queue is full","Increases bandwidth","Disables QoS"],a:1,e:"WRED (Weighted Random Early Detection) drops packets proactively to prevent tail drops."},

{q:"Multiple SSIDs on AP: switch port config?",o:["Trunk allowing necessary VLANs","Access mode","802.1X","EtherChannel"],a:0,e:"Trunk port carries multiple VLANs for different SSIDs."},
{q:"BSS in wireless: what is it?",o:["Backup switching service","Basic Service Set — AP and associated clients","Border security system","Bandwidth sharing service"],a:1,e:"BSS = the AP and all its associated wireless clients."},
{q:"5 GHz advantage over 2.4 GHz?",o:["Longer range","More non-overlapping channels and higher throughput","Better wall penetration","Lower cost"],a:1,e:"5 GHz has more channels, less interference, and higher speeds."}]},
{id:38,name:"Automation & Programmability",q:[

{q:"JSON uses which notation style?",o:["Angle brackets <tags>","Indentation only","Key:value pairs in curly braces {}","Comma-separated values"],a:2,e:"JSON uses {key: value} pairs in curly braces."},

{q:"RESTCONF uses which protocol?",o:["SSH","FTP","HTTPS","Telnet"],a:2,e:"RESTCONF uses HTTPS (HTTP methods over TLS)."},
{q:"Cisco DNA Center provides what?",o:["IOS upgrade only","Centralized network management, policy, automation, and assurance","Physical security","WAN optimization only"],a:1,e:"DNA Center = centralized management, policy automation, network assurance, SD-Access."},

{id:39,name:"Device Setup Drills",q:[

{q:"Why assign unused ports to VLAN 999 and shut them down?",o:["Increases performance","Prevents unauthorized access — plug in and reach nothing","Required for VTP","Enables PortFast"],a:1,e:"Black-hole VLAN + shutdown = defense in depth for unused ports."},

{q:"What is the purpose of 'errdisable recovery'?",o:["Prevents err-disable","Automatically re-enables err-disabled ports after a timer","Logs all errors","Resets passwords"],a:1,e:"errdisable recovery auto-re-enables ports after a configured interval."},
{q:"SNMPv3 vs SNMPv2c: key advantage?",o:["SNMPv3 is faster","SNMPv3 adds authentication and encryption","SNMPv2c uses UDP; SNMPv3 uses TCP","SNMPv3 has fewer MIBs"],a:1,e:"SNMPv3 adds SHA authentication and AES encryption — critical for production security."},

switch:{
title:"Switch Hardening — Full Baseline",
steps:[
{label:"1. Identity & Credentials",cmd:"hostname SW1\nenable secret <strong-pass>\nusername admin privilege 15 secret <strong-pass>",why:"Unique hostname for identification. Enable secret uses MD5 — never use enable password alone."},
{label:"2. SSH Key Generation",cmd:"ip domain-name company.local\ncrypto key generate rsa modulus 2048\nip ssh version 2",why:"2048-bit RSA minimum. SSH v2 only — SSH v1 has known vulnerabilities."},
{label:"3. VTY Lines (Remote Access)",cmd:"line vty 0 15\n transport input ssh\n login local\n exec-timeout 10 0\n logging synchronous",why:"SSH only, no Telnet. Local auth. 10-min timeout. Prevents session accumulation."},
{label:"4. Console Line",cmd:"line console 0\n logging synchronous\n exec-timeout 10 0",why:"Prevent idle console sessions. Logging sync prevents output interrupting typing."},
{label:"5. Login Protection",cmd:"login block-for 60 attempts 3 within 30",why:"CIS Benchmark: block login after 3 failures in 30 seconds for 60 seconds. Prevents brute force."},
{label:"6. Banners & Encryption",cmd:"banner motd # Authorized access only. All activity logged. #\nservice password-encryption\nno ip domain-lookup",why:"Legal warning required for prosecution. Password encryption prevents casual reading. No domain-lookup prevents command typo delays."},
{label:"7. Management SVI",cmd:"interface vlan 1\n ip address 10.10.10.200 255.255.255.0\n no shutdown\nip default-gateway 10.10.10.1",why:"Management access via SVI. Default gateway required for switch to send traffic off-subnet."},
{label:"8. VLANs + Black Hole",cmd:"vlan 10\n name DATA\nvlan 20\n name VOICE\nvlan 999\n name BLACKHOLE\nspanning-tree mode rapid-pvst",why:"VLAN 999 = unused port destination. RSTP for fast convergence."},
{label:"9. Access Port Security",cmd:"interface range fa0/1 - 20\n switchport mode access\n switchport access vlan 10\n switchport port-security\n switchport port-security maximum 2\n switchport port-security violation shutdown\n switchport port-security mac-address sticky\n spanning-tree portfast\n spanning-tree bpduguard enable",why:"Force access mode. Port security limits MACs. Sticky learning. BPDU Guard err-disables if switch plugged in. PortFast for end devices only."},
{label:"10. Trunk Hardening",cmd:"interface gi0/1\n switchport mode trunk\n switchport trunk native vlan 999\n switchport nonegotiate\n switchport trunk allowed vlan 10,20",why:"Static trunk (no DTP). Native VLAN 999 prevents double-tagging attacks. Only allow needed VLANs."},
{label:"11. Disable Unused Ports",cmd:"interface range fa0/21 - 24\n switchport mode access\n switchport access vlan 999\n shutdown",why:"Move to black-hole VLAN AND shut down. Defense in depth for physical port security."},
{label:"12. Disable Unused Services",cmd:"no ip http server\nno ip http secure-server\nno cdp run\nno lldp run",why:"Remove attack surface. CDP/LLDP can reveal topology to attacker — disable on edge ports or disable globally if not needed."},
{label:"13. SNMP v3 (if needed)",cmd:"snmp-server group SNMPV3GROUP v3 priv\nsnmp-server user SNMPUSER SNMPV3GROUP v3 auth sha <authpass> priv aes 128 <privpass>",why:"SNMPv3 with auth+encryption. Never use SNMPv2c (community strings in plaintext) in production."},
{label:"14. Logging + NTP",cmd:"logging host 10.10.10.100\nlogging trap informational\nservice timestamps log datetime msec\nntp server 10.10.10.100",why:"Centralized syslog with millisecond timestamps. NTP sync required for meaningful logs."},
{label:"15. Save Config",cmd:"end\ncopy run start",why:"Always save. If device reboots, hardened config must persist."},
]},
router:{
title:"Router Hardening — Full Baseline",
steps:[
{label:"1. Identity & Credentials",cmd:"hostname R1\nenable secret <strong-pass>\nusername admin privilege 15 secret <strong-pass>",why:"Same as switch — hostname for ID, enable secret for privileged access."},
{label:"2. SSH",cmd:"ip domain-name company.local\ncrypto key generate rsa modulus 2048\nip ssh version 2\nip ssh time-out 60\nip ssh authentication-retries 2",why:"SSH v2 only. Reduce authentication window. Limit retries."},
{label:"3. VTY Lines",cmd:"line vty 0 4\n transport input ssh\n login local\n exec-timeout 10 0\n access-class VTY_ACCESS in",why:"SSH only. Local auth. Timeout. ACL limits which IPs can SSH to router."},
{label:"4. VTY ACL",cmd:"ip access-list standard VTY_ACCESS\n permit 10.10.10.0 0.0.0.255\n deny any log",why:"Only management VLAN can reach VTY lines. 'log' keyword logs denied attempts."},
{label:"5. Console",cmd:"line console 0\n logging synchronous\n exec-timeout 10 0\n login local",why:"Require credentials even on console. Timeout idle sessions."},
{label:"6. Banners & Services",cmd:"banner motd # Authorized access only. All activity logged. #\nservice password-encryption\nno ip domain-lookup\nno ip http server\nno ip http secure-server",why:"Legal warning. Encrypt passwords. Disable web management. Remove attack surface."},
{label:"7. Interfaces",cmd:"interface gi0/0\n description LAN\n ip address 10.10.10.1 255.255.255.0\n no ip proxy-arp\n no ip redirects\n no ip unreachables\n no shutdown",why:"Disable proxy-ARP (can mask misconfigs). Disable ICMP redirects and unreachables on untrusted interfaces."},
{label:"8. Routing Security",cmd:"router ospf 1\n router-id 1.1.1.1\n passive-interface default\n no passive-interface gi0/0\nip route 0.0.0.0 0.0.0.0 <ISP-gateway>",why:"Passive by default — only advertise routing on specific inter-router links. Limits topology exposure."},
{label:"9. OSPF Authentication",cmd:"interface gi0/0\n ip ospf authentication message-digest\n ip ospf message-digest-key 1 md5 <ospf-key>",why:"OSPF MD5 authentication prevents rogue router injection."},
{label:"10. DHCP Server Hardening",cmd:"ip dhcp excluded-address 10.10.10.1 10.10.10.10\nip dhcp pool LAN_POOL\n network 10.10.10.0 255.255.255.0\n default-router 10.10.10.1\n dns-server 8.8.8.8 8.8.4.4\n lease 1",why:"Exclude router/infrastructure IPs. Short lease (1 day) limits stale assignments."},
{label:"11. CoPP — Control Plane Protection",cmd:"access-list 100 permit tcp any any eq 22\naccess-list 101 permit icmp any any\npolicy-map COPP_POLICY\n class class-default\n  police 8000 conform-action transmit exceed-action drop\ncontrol-plane\n service-policy input COPP_POLICY",why:"Rate-limit traffic to router CPU. Prevents DoS attacks against the control plane."},
{label:"12. AAA",cmd:"aaa new-model\naaa authentication login default local\naaa authorization exec default local\naaa accounting exec default start-stop group tacacs+",why:"Enable AAA framework. Local fallback always configured. Accounting logs all exec sessions."},
{label:"13. NTP + Logging",cmd:"ntp server 10.10.10.100\nlogging host 10.10.10.100\nlogging trap informational\nservice timestamps log datetime msec\nservice timestamps debug datetime msec",why:"Synchronized time is mandatory for meaningful logs and forensics."},
{label:"14. Disable Legacy Protocols",cmd:"no service tcp-small-servers\nno service udp-small-servers\nno service finger\nno cdp run",why:"Remove legacy services that create attack surface. CDP disabled on WAN/untrusted interfaces."},
{label:"15. Save",cmd:"end\ncopy run start",why:"Persist the hardened config."},
]},

  h+=`<span class="br">Referenced by: §33 Cisco Device Security · §34 Network Mgmt · §39 Setup Drills</span>`;
  h+=`</div>`;

  // Tabs
  h+=`<div class="tab-bar">`;
  h+=`<div class="tab ${secTab==='hswitch'?'active':''}" onclick="setTab('hswitch')">🔀 Switch</div>`;

  h+=`<div class="cs" style="border-color:#ef4444;margin-bottom:8px"><h3 style="color:#fca5a5">Switch Hardening — Complete Baseline</h3><p style="font-size:.66rem;color:var(--mut)">Follow in order. Each step has the 'why' — know this for the interview and the job.</p></div>`;

    {s:"7. Default Route",c:"ip route 0.0.0.0 0.0.0.0 203.0.113.2"},

// ===== RENDER GLOSSARY =====
function renderGlossary(a){
  let h=`<button class="bb" onclick="goMenu()">← Menu</button>`;
  h+=`<div class="sh"><h2>📖 Full CCNA Glossary</h2><p>${G.length} terms · Click sections to study · Searchable A-Z</p></div>`;
  h+=`<input type="text" class="gs" placeholder="Search terms..." value="${gSrch}" oninput="fG(this.value)" id="gsi">`;
  const filtered=gSrch?G.filter(g=>g.t.toLowerCase().includes(gSrch.toLowerCase())||g.d.toLowerCase().includes(gSrch.toLowerCase())):G;
  const sorted=[...filtered].sort((a,b)=>a.t.localeCompare(b.t));
  let cl='';
  sorted.forEach(g=>{
    const first=g.t[0].toUpperCase();
    const lg=/[0-9]/.test(first)?'#':first;
    if(lg!==cl){cl=lg;h+=`<div class="gl2">${cl}</div>`;}
    h+=`<div class="vc"><div class="vt">${g.t} <span style="font-size:.54rem;color:var(--mut);font-weight:400">${g.s.map(s=>'§'+s).join(',')}</span></div><div class="vd">${g.d}</div></div>`;
  });
  if(!sorted.length)h+=`<p style="text-align:center;color:var(--mut);padding:12px">No matches for "${gSrch}"</p>`;
  h+=`<div style="text-align:center;padding:10px"><button class="bb" onclick="goMenu()">← Menu</button></div>`;
  a.innerHTML=h;
  const el=document.getElementById('gsi');
  if(el&&gSrch){el.focus();el.setSelectionRange(gSrch.length,gSrch.length);}
}

// ===== RENDER JOBS =====
function renderJobs(a){
  const reg=JOB_REGIONS[jobRegion];
  let h=`<button class="bb" onclick="goMenu()">← Menu</button>`;
  h+=`<div class="sh"><h2>🔍 CCNA Job Search</h2><p>10 roles · Pre-searched on 6 job sites · Click any button to search instantly</p></div>`;
  h+=`<div style="margin-bottom:10px"><p style="font-size:.72rem;color:var(--mut);margin-bottom:4px;font-weight:600">📍 Select Region:</p>`;
  JOB_REGIONS.forEach((r,i)=>h+=`<span class="region-btn ${i===jobRegion?'active':''}" onclick="setRegion(${i})">${r.name}</span> `);
  h+=`<div class="region-note" style="margin-top:5px">🏛️ ${reg.notes}</div></div>`;
  JOB_ROLES.forEach(role=>{
    h+=`<div class="job-role"><h3><span style="font-size:.7rem;color:var(--mut);font-family:'JetBrains Mono',monospace">#${role.rank}</span> ${role.title} <span class="job-pay">${role.pay}</span></h3>`;
    h+=`<div class="job-desc">${role.desc}</div><div class="job-links">`;
    JOB_SITES.forEach(site=>{
      const q=encodeURIComponent(role.keys);

    });
    h+=`</div></div>`;

  h+=`<div class="cs" style="margin-top:10px"><h3>🌐 More Resources</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:4px">`;

  a.innerHTML=h;
}

// ===== NAVIGATION & HELPERS =====
function go(v){view=v;secTab=v==='harden'?'hswitch':'study';render();window.scrollTo(0,0);}
function goSection(id){cur=id;view='section';secTab='study';qAns={};qSub=false;curChap=null;render();window.scrollTo(0,0);}
function goMenu(){view='menu';cur=null;render();window.scrollTo(0,0);}
function setTab(t){secTab=t;render();}
function setRegion(i){jobRegion=i;render();}
function fG(v){gSrch=v;render();}
function selA(qi,oi){if(!qSub){qAns[qi]=oi;render();}}
function submitQuiz(){qSub=true;render();window.scrollTo(0,0);}
function resetQuiz(){qAns={};qSub=false;render();}
function loadChap(f){curChap=f;render();}
function toggleIV(el){
  el.querySelector('.arrow').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

// ===== BOOT =====
render();
</script>
