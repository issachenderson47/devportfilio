:root{--bg:#0a0e17;--card:#111827;--card2:#1a2332;--ac:#00e5ff;--ac2:#7c3aed;--ok:#10b981;--no:#ef4444;--txt:#e2e8f0;--mut:#64748b;--bor:#1e293b;--gold:#f59e0b;--warn:#f97316}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
.app{max-width:960px;margin:0 auto;padding:14px}
header{text-align:center;padding:22px 0 14px;border-bottom:1px solid var(--bor);margin-bottom:14px}
header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--mut);margin-top:3px;font-size:.78rem}
.bb{background:none;border:1px solid var(--bor);color:var(--ac);padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.78rem;margin-bottom:10px;transition:.1s;margin-right:4px}
.bb:hover{background:var(--card)}
.sg{display:grid;gap:3px}
.sb{background:var(--card);border:1px solid var(--bor);color:var(--txt);padding:9px 11px;border-radius:6px;cursor:pointer;text-align:left;font-family:inherit;font-size:.8rem;transition:.1s;display:flex;align-items:center;gap:8px}
.sb:hover{background:var(--card2);border-color:var(--ac);transform:translateX(2px)}
.sb .n{background:var(--ac2);color:#fff;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-weight:700;font-size:.65rem;flex-shrink:0}
.sb .qc{margin-left:auto;color:var(--ac);font-size:.62rem;font-family:'JetBrains Mono',monospace;font-weight:600;flex-shrink:0}
.sb.gl{border-color:var(--gold)}.sb.gl .n{background:var(--gold)}
.lt{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.55rem;font-family:'JetBrains Mono',monospace;font-weight:700;margin-left:3px;vertical-align:middle}
.l1{background:#2d0a0a;color:#ef4444;border:1px solid #5c1a1a}
.l2{background:#2d1f0a;color:#f59e0b;border:1px solid #5c3a1a}
.l3{background:#0a2d1a;color:#10b981;border:1px solid #1a5c3a}
.l4{background:#0a1a2d;color:#3b82f6;border:1px solid #1a3a5c}
.l7{background:#1a0a2d;color:#a855f7;border:1px solid #3a1a5c}
.lm{background:#1a1a2d;color:#818cf8;border:1px solid #3a3a5c}
.sh{margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bor)}
.sh h2{font-size:1.05rem;font-weight:700;color:var(--ac)}

.ql:hover{filter:brightness(1.15)}

.ql.green{background:linear-gradient(135deg,#065f46,var(--ok))}
.cs{background:var(--card);border:1px solid var(--bor);border-radius:8px;padding:12px;margin-bottom:8px}
.cs h3{font-size:.82rem;font-weight:700;color:var(--ac);margin-bottom:5px;cursor:pointer}
.cs ul{list-style:none;padding:0}
.cs li{font-size:.74rem;color:#cbd5e1;padding:2px 0 2px 11px;position:relative;line-height:1.35}

.sub:hover{transform:scale(1.02);filter:brightness(1.1)}

.pdf-wrapper{position:relative;width:100%;height:80vh;border:1px solid var(--bor);border-radius:6px;overflow:hidden;background:#1a1a2e}
.pdf-wrapper iframe,.pdf-wrapper object,.pdf-wrapper embed{width:100%;height:100%;border:none}
.ch-btn{display:inline-block;padding:5px 10px;margin:2px;border-radius:4px;font-size:.72rem;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--bor);background:var(--card);color:var(--ac);transition:.1s}
.ch-btn:hover,.ch-btn.active{background:var(--ac2);color:#fff;border-color:var(--ac2)}

.topo-img{max-width:100%;border:1px solid var(--bor);border-radius:6px;margin:6px 0;cursor:pointer;transition:.2s}
.topo-img:hover{border-color:var(--ac);transform:scale(1.01)}

.cfg-box{background:#0f172a;border:1px solid var(--bor);border-radius:6px;padding:10px;margin:6px 0;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--ac);white-space:pre-wrap;max-height:200px;overflow-y:auto;line-height:1.4}
.cfg-box::-webkit-scrollbar{width:4px}.cfg-box::-webkit-scrollbar-thumb{background:var(--ac2);border-radius:2px}

{q:"Which command enters global configuration mode from privileged EXEC?",o:["enable","configure terminal","config","setup"],a:1,e:"'configure terminal' (or 'conf t') enters global configuration mode from privileged EXEC."},
{q:"Which command resets an interface to default configuration?",o:["no shutdown","default interface <name>","clear interface <name>","reset interface <name>"],a:1,e:"'default interface' removes all custom configuration from the interface, restoring defaults."},
{q:"What does 'no shutdown' do on an interface?",o:["Saves the config","Enables the interface","Resets the interface","Shows interface status"],a:1,e:"'no shutdown' administratively enables an interface that was in shutdown state."},
{q:"Which command shows the IOS version and hardware info?",o:["show version","show hardware","show system","show ios"],a:0,e:"'show version' displays IOS version, uptime, hardware details, and configuration register."},
{q:"What is stored in NVRAM on a Cisco device?",o:["Running configuration","IOS image","Startup configuration","ARP table"],a:2,e:"NVRAM stores the startup-config, which is loaded when the device boots."},
{q:"Which command encrypts all plaintext passwords in the config?",o:["enable secret","service password-encryption","password encryption","encrypt passwords"],a:1,e:"'service password-encryption' applies weak (Type 7) encryption to all plaintext passwords in config."},
]},

// ===== SECTION 5: Transport Layer =====
{id:5,name:"OSI Layer 4 - The Transport Layer",q:[
{q:"Which protocol is connection-oriented and provides reliable delivery?",o:["UDP","ICMP","TCP","ARP"],a:2,e:"TCP is connection-oriented, providing reliable delivery with sequencing, acknowledgments, and flow control."},
{q:"Which protocol is connectionless and provides best-effort delivery?",o:["TCP","UDP","SCTP","TLS"],a:1,e:"UDP is connectionless — no handshake, no guaranteed delivery, lower overhead."},
{q:"HTTP uses which transport layer protocol and port?",o:["UDP port 53","TCP port 80","TCP port 443","UDP port 161"],a:1,e:"HTTP uses TCP port 80. HTTPS uses TCP port 443."},
{q:"DNS typically uses which transport protocol and port?",o:["TCP port 80","UDP port 53","TCP port 53","UDP port 67"],a:1,e:"DNS primarily uses UDP port 53 for queries. TCP port 53 is used for zone transfers and large responses."},
{q:"What is the TCP three-way handshake sequence?",o:["SYN → ACK → FIN","SYN → SYN-ACK → ACK","ACK → SYN → FIN","SYN → FIN → ACK"],a:1,e:"TCP connection: Client sends SYN, Server replies SYN-ACK, Client sends ACK. Connection established."},
{q:"Which port number range is designated as 'well-known' ports?",o:["0-255","0-1023","1024-49151","49152-65535"],a:1,e:"Well-known ports: 0-1023. Registered: 1024-49151. Dynamic/Ephemeral: 49152-65535."},
{q:"DHCP server uses which port?",o:["UDP 53","UDP 67","UDP 68","TCP 80"],a:1,e:"DHCP server listens on UDP 67. DHCP client uses UDP 68."},
{q:"Which port does SSH use?",o:["TCP 21","TCP 22","TCP 23","TCP 25"],a:1,e:"SSH uses TCP port 22. Telnet uses TCP 23. FTP uses TCP 21."},
{q:"What does a TCP window size control?",o:["Maximum segment size","Amount of data sent before requiring ACK","Connection timeout","Number of retransmissions"],a:1,e:"Window size controls how much data can be sent before waiting for an acknowledgment — flow control mechanism."},
{q:"Which transport protocol does SNMP use?",o:["TCP 161","UDP 161","TCP 162","UDP 25"],a:1,e:"SNMP uses UDP port 161 for queries and UDP port 162 for traps."},
{q:"What does Telnet use for transport?",o:["UDP port 22","TCP port 23","TCP port 22","UDP port 23"],a:1,e:"Telnet uses TCP port 23. It transmits data in plaintext — SSH (TCP 22) is the secure alternative."},
{q:"Which field in a TCP header ensures data arrives in the correct order?",o:["Source port","Checksum","Sequence number","Window size"],a:2,e:"Sequence numbers track the order of data segments, enabling the receiver to reassemble them correctly."},
{q:"Which DNS query type tells the resolver to follow referrals step by step?",o:["Recursive","Iterative","Inverse","Reverse"],a:1,e:"Iterative queries return referrals; the resolver follows them. Recursive queries expect the server to do all the work."},
{q:"HTTPS uses which port?",o:["TCP 80","TCP 443","UDP 443","TCP 8080"],a:1,e:"HTTPS uses TCP port 443 with TLS/SSL encryption."},
{q:"FTP data transfer uses which port?",o:["TCP 20","TCP 21","UDP 20","TCP 22"],a:0,e:"FTP uses TCP 21 for control and TCP 20 for data transfer."},
]},

// ===== SECTION 6: Network Layer =====
{id:6,name:"OSI Layer 3 - The Network Layer",q:[
{q:"Router receives packet for unknown destination but has default route. Action?",o:["Forwards via default route","Drops immediately","Sends ICMP Redirect","ARPs for destination"],a:0,e:"Default route catches all unmatched destinations and forwards them to the configured next-hop."},
{q:"Which best describes a router's function?",o:["Determines best path based on destination IP","Segments into collision domains only","Operates at Data Link layer with MACs","Converts IP to MAC using ARP"],a:0,e:"Routers operate at Layer 3 — they analyze destination IPs and determine the optimal forwarding path."},
{q:"Multiple routing protocols configured. Which factor determines path selection first?",o:["Delay","Bandwidth","Administrative distance","Hop count"],a:2,e:"AD is evaluated first. The routing source with the lowest AD is preferred regardless of metric."},
{q:"Two static routes to same destination: different ADs and metrics. Which is selected?",o:["Lowest metric","Both for load balancing","Neither","Lowest administrative distance"],a:3,e:"AD is evaluated first. Only when ADs are equal are metrics compared."},
{q:"How does a router select optimal path using routing table?",o:["Uses metrics like bandwidth, delay, reliability via dynamic protocols","Uses ARP cache","Uses default gateway and static routes only","Sends to all routes and waits for ACK"],a:0,e:"Dynamic protocols calculate best paths using metrics. Routers select the path with the best metric among routes with the same AD."},
{q:"Router has O [110/20] and * [90/10] routes for 10.1.1.0/24. Which path for 10.1.1.5?",o:["OSPF route (110)","EIGRP route (90)","Both for load balancing","Packet dropped"],a:1,e:"The [90/10] route has lower AD (90 < 110), so it's preferred regardless of the OSPF metric."},
{q:"What is the administrative distance of OSPF?",o:["90","100","110","120"],a:2,e:"OSPF AD=110. EIGRP=90. RIP=120. Static=1. Connected=0. BGP=20 (eBGP)."},
{q:"What is the AD of a directly connected network?",o:["0","1","5","10"],a:0,e:"Directly connected networks have AD=0 — the most trusted route source."},
{q:"What is the AD of a static route by default?",o:["0","1","5","90"],a:1,e:"Static routes have AD=1 by default, making them preferred over all dynamic routing protocols."},
{q:"ICMP Type 3 Code 1 means what?",o:["Echo reply","Destination host unreachable","Time exceeded","Redirect"],a:1,e:"ICMP Type 3 Code 1 = Host Unreachable — the destination host cannot be reached."},
{q:"Asymmetric routing causes issues with what type of device?",o:["Hub","Switch","Stateful firewall","DNS server"],a:2,e:"Stateful firewalls expect bidirectional traffic on the same path. Asymmetric routing causes dropped packets."},
{q:"Which protocol provides error reporting for IP?",o:["TCP","UDP","ICMP","ARP"],a:2,e:"ICMP provides error messages (destination unreachable, time exceeded) and diagnostics (ping, traceroute)."},
{q:"What does TTL (Time to Live) prevent?",o:["Duplicate addresses","Packets looping indefinitely","MAC spoofing","VLAN hopping"],a:1,e:"TTL decrements at each hop. When it reaches 0, the packet is discarded — preventing infinite routing loops."},
{q:"Which field in an IP header identifies the transport protocol?",o:["Version","TTL","Protocol","Header checksum"],a:2,e:"Protocol field: 6=TCP, 17=UDP, 1=ICMP, 89=OSPF."},
{q:"What is the maximum size of an IPv4 address?",o:["16 bits","32 bits","48 bits","128 bits"],a:1,e:"IPv4 uses 32-bit addresses, displayed as four decimal octets (e.g., 192.168.1.1)."},
]},

// ===== SECTION 7: IP Address Classes =====
{id:7,name:"IP Address Classes",q:[
{q:"192.168.15.50/27: usable hosts and broadcast address?",o:["64 usable, broadcast .64","62 usable, broadcast .127","30 usable, broadcast 192.168.15.63","32 usable, broadcast .32"],a:2,e:"/27=32 addresses. Subnet: .32-.63. Usable: 30 (.33-.62), broadcast: .63."},
{q:"Which is a Class A private IP range?",o:["172.16.0.0 - 172.31.255.255","192.168.0.0 - 192.168.255.255","10.0.0.0 - 10.255.255.255","224.0.0.0 - 239.255.255.255"],a:2,e:"Class A private: 10.0.0.0/8. Class B: 172.16.0.0/12. Class C: 192.168.0.0/16."},
{q:"Which IP class has a default mask of 255.255.255.0?",o:["Class A","Class B","Class C","Class D"],a:2,e:"Class C: 192-223.x.x.x with default mask 255.255.255.0 (/24)."},
{q:"Which IP address range is Class B?",o:["1-126","128-191","192-223","224-239"],a:1,e:"Class A: 1-126, Class B: 128-191, Class C: 192-223, Class D: 224-239 (multicast)."},
{q:"What is the loopback address range?",o:["10.0.0.0/8","127.0.0.0/8","169.254.0.0/16","192.168.0.0/16"],a:1,e:"127.0.0.0/8 is reserved for loopback. 127.0.0.1 is the standard loopback address."},
{q:"169.254.0.0/16 is used for what?",o:["Multicast","Private addressing","APIPA (Automatic Private IP Addressing)","Loopback"],a:2,e:"APIPA assigns addresses in 169.254.0.0/16 when no DHCP server is available."},
{q:"Which Class A address is NOT usable for hosts?",o:["10.0.0.1","126.0.0.1","127.0.0.1","100.0.0.1"],a:2,e:"127.x.x.x is reserved for loopback, not usable for host addressing."},
{q:"What is the broadcast address of 172.16.0.0/16?",o:["172.16.0.255","172.16.255.255","172.31.255.255","172.255.255.255"],a:1,e:"172.16.0.0/16 has broadcast 172.16.255.255 (all host bits set to 1)."},
{q:"How many usable hosts in a /24 network?",o:["256","255","254","252"],a:2,e:"2^8 = 256 total - 2 (network + broadcast) = 254 usable hosts."},
{q:"Which address class is used for multicast?",o:["Class A","Class B","Class C","Class D"],a:3,e:"Class D (224-239) is reserved for multicast. Class E (240-255) is experimental."},
{q:"IPv6 link-local addresses start with which prefix?",o:["2001::/16","FC00::/7","FE80::/10","FF00::/8"],a:2,e:"Link-local = FE80::/10. Used for same-segment communication only — not routable."},
{q:"IPv6 addresses are how many bits long?",o:["32","48","64","128"],a:3,e:"IPv6 = 128 bits, displayed as 8 groups of 4 hex digits separated by colons."},
{q:"What is the IPv6 loopback address?",o:["127.0.0.1","FE80::1","::1","FF02::1"],a:2,e:"IPv6 loopback = ::1 (equivalent to IPv4's 127.0.0.1)."},
{q:"Which is NOT a valid IPv6 address type?",o:["Unicast","Multicast","Broadcast","Anycast"],a:2,e:"IPv6 does not support broadcast. It uses multicast and anycast instead."},
{q:"The first 24 bits of a MAC address represent what?",o:["Device serial number","OUI (manufacturer ID)","Interface identifier","VLAN tag"],a:1,e:"The OUI (Organizationally Unique Identifier) is the first 24 bits, identifying the NIC manufacturer."},
]},

// ===== SECTION 8: Subnetting =====
{id:8,name:"Subnetting",q:[
{q:"192.168.1.0/25 — max equal subnets with min 20 hosts each?",o:["/28","/27","/29","/26"],a:1,e:"/27=30 hosts (meets 20 min). From /25 you get 4x /27 — maximum possible."},
{q:"Subnet mask for exactly 1,022 usable IPs?",o:["255.255.248.0","255.255.252.0","255.255.240.0","255.255.254.0"],a:1,e:"255.255.252.0=/22. 2^10=1024-2=1,022 usable."},
{q:"Subnet for exactly 6 devices with least waste?",o:["/27","/28","/29","/30"],a:2,e:"/29=8 total, 6 usable. Perfect fit with zero waste."},
{q:"Class B network needs subnets for 500 hosts each. Best mask?",o:["255.255.255.0","255.255.248.0","255.255.252.0","255.255.254.0"],a:3,e:"255.255.254.0=/23. 2^9=512 total, 510 usable — meets 500-host requirement."},
{q:"Which addressing scheme optimizes per-department subnets?",o:["/24 per department","/30 per department","Single /24 for all","VLSM"],a:3,e:"VLSM allocates different-sized subnets based on each department's actual needs."},
{q:"Misconfigured /25 on a /26 interface. What problem occurs?",o:["Broadcasts subnet conflict","Routes to others but not own subnet","Cannot route to any subnet","Routes incorrectly within subnet and misroutes externally"],a:3,e:"Wrong mask = wrong IP range understanding → misrouted packets locally and externally."},
{q:"How many subnets does a /28 create from a /24?",o:["4","8","16","32"],a:2,e:"From /24 to /28 = 4 additional bits = 2^4 = 16 subnets, each with 14 usable hosts."},
{q:"What is the subnet mask for /20?",o:["255.255.240.0","255.255.248.0","255.255.224.0","255.255.252.0"],a:0,e:"/20 = 255.255.240.0. 20 bits for network = 11111111.11111111.11110000.00000000."},
{q:"192.168.10.130/25 — which subnet does this belong to?",o:["192.168.10.0","192.168.10.64","192.168.10.128","192.168.10.192"],a:2,e:"/25 splits into 2 subnets: .0-.127 and .128-.255. Address .130 is in the .128 subnet."},
{q:"/30 is typically used for what?",o:["Server farms","Point-to-point links","Wireless networks","Guest VLANs"],a:1,e:"/30 provides 4 IPs, 2 usable — designed for point-to-point router links."},
{q:"How many usable hosts in a /26?",o:["30","62","64","126"],a:1,e:"2^6=64 total - 2 = 62 usable hosts per /26 subnet."},
{q:"10.0.0.0/8 — how many total host addresses?",o:["256","65,534","16,777,214","16,777,216"],a:2,e:"2^24 = 16,777,216 total - 2 = 16,777,214 usable host addresses."},
{q:"Which is the network address: 172.16.45.67/20?",o:["172.16.32.0","172.16.40.0","172.16.44.0","172.16.45.0"],a:0,e:"/20 = 255.255.240.0. Third octet 45 AND 240 = 32. Network = 172.16.32.0."},
{q:"CIDR notation /22 equals which subnet mask?",o:["255.255.248.0","255.255.252.0","255.255.254.0","255.255.240.0"],a:1,e:"/22 = 22 bits network = 255.255.252.0."},
{q:"What is supernetting (route summarization)?",o:["Dividing a network into smaller subnets","Combining multiple subnets into a single larger route","Converting IPv4 to IPv6","Assigning private IPs"],a:1,e:"Supernetting combines multiple contiguous subnets into a single route advertisement to reduce routing table size."},
]},

{id:9,name:"OSI Layer 2 - The Data-Link Layer",q:[
{q:"Switch receives unknown unicast. What does it do?",o:["Drops it","Queries other switches","Forwards to gateway","Floods all ports except ingress"],a:3,e:"Unknown unicast → flood all ports except source to ensure delivery."},
{q:"Switches: collision domains vs broadcast domains?",o:["Single collision, single broadcast","Splits collision, maintains single broadcast","Single collision, splits broadcast","Splits both"],a:1,e:"Switches create per-port collision domains but share one broadcast domain (without VLANs)."},
{q:"What is the OUI in a MAC address?",o:["Payload type","Manufacturer identifier","Protocol identifier","Subnet indicator"],a:1,e:"OUI = 24-bit manufacturer ID assigned by IEEE."},
{q:"MAC table's role in security?",o:["DAI for ARP spoofing","Prevents MitM via MAC-port mapping","Tracks IPs for anti-spoofing","Enables forwarding; with port security mitigates CAM overflow"],a:3,e:"MAC table enables L2 forwarding. Port security on top mitigates CAM overflow attacks."},
{q:"How does STP determine the root port?",o:["Lowest bridge priority","Highest bandwidth","Lowest path cost to root bridge","Highest MAC"],a:2,e:"Root port = lowest cost path to root bridge."},
{q:"What triggers a switch to update its MAC address table?",o:["Receiving an ARP reply","Examining the source MAC of received frames","Running STP calculations","Receiving a BPDU"],a:1,e:"Switches learn MAC addresses by examining the source MAC address of incoming frames and associating them with the ingress port."},
{q:"What is the purpose of the preamble in an Ethernet frame?",o:["Error detection","Synchronization of receiver clock","VLAN identification","Source identification"],a:1,e:"The 7-byte preamble provides clock synchronization for the receiving device. The SFD marks the frame start."},
{q:"Which switching method checks only the destination MAC before forwarding?",o:["Store-and-forward","Cut-through","Fragment-free","Adaptive"],a:1,e:"Cut-through reads only the destination MAC (first 6 bytes after preamble) and immediately begins forwarding."},
{q:"Store-and-forward switching does what before forwarding?",o:["Reads only destination MAC","Receives entire frame and checks CRC","Reads first 64 bytes","Forwards immediately"],a:1,e:"Store-and-forward receives the entire frame, checks CRC for errors, then forwards. Most reliable but highest latency."},
{q:"Fragment-free switching reads how many bytes before forwarding?",o:["6 bytes","14 bytes","64 bytes","512 bytes"],a:2,e:"Fragment-free reads 64 bytes (minimum valid frame size) to filter out collision fragments (runts) before forwarding."},
{q:"What happens when a switch's MAC table is full?",o:["Drops all new frames","Floods all frames like a hub","Sends error to admin","Clears oldest entries only"],a:1,e:"When the MAC table (CAM) is full, the switch can't learn new addresses and floods all frames — behaving like a hub. This is a security risk."},
{q:"Which Layer 2 protocol prevents loops?",o:["ARP","STP","VTP","DTP"],a:1,e:"STP (Spanning Tree Protocol) prevents Layer 2 loops by blocking redundant paths."},
{q:"What is a collision domain?",o:["All devices sharing a broadcast address","Network segment where only one device can transmit at a time","VLAN boundary","Subnet boundary"],a:1,e:"A collision domain is a network segment where simultaneous transmissions can cause collisions. Each switch port = separate collision domain."},
{q:"What is a broadcast domain?",o:["All devices that receive each other's broadcast frames","Devices in the same collision domain","Devices sharing the same switch","All devices on the internet"],a:0,e:"A broadcast domain includes all devices that receive each other's broadcast frames. VLANs and routers create broadcast domain boundaries."},
{q:"Which frame type does 802.1Q add to an Ethernet frame?",o:["Preamble extension","4-byte VLAN tag","FCS modification","MAC extension"],a:1,e:"802.1Q inserts a 4-byte VLAN tag between the source MAC and EtherType fields for VLAN identification."},
]},

{id:10,name:"OSI Layer 1 - The Physical Layer",q:[
{q:"10GBASE-ER supports what distance?",o:["300m","10km","40km","100km"],a:2,e:"10GBASE-ER = 40km on single-mode fiber at 10 Gbps."},
{q:"Excessive CRC errors on a port indicate what?",o:["Faulty cabling","VLAN mismatch","Duplex mismatch","Broadcast storm"],a:0,e:"CRC errors typically mean physical issues: bad cables, connectors, or EMI."},
{q:"10GBASE-LR supports what max distance?",o:["300m","550m","10km","40km"],a:2,e:"10GBASE-LR = 10km on single-mode fiber."},
{q:"Which cable type is used for 10GBASE-SR?",o:["Single-mode fiber","Multimode fiber","Cat5e","Cat6a"],a:1,e:"10GBASE-SR uses multimode fiber, max 300-400m depending on fiber type."},
{q:"Cat5e cable supports which maximum speed?",o:["100 Mbps","1 Gbps","10 Gbps","40 Gbps"],a:1,e:"Cat5e supports up to 1 Gbps at 100m. Cat6a is needed for 10 Gbps."},
{q:"What is the max distance for Cat6a at 10 Gbps?",o:["55m","100m","300m","550m"],a:1,e:"Cat6a supports 10 Gbps at up to 100m. Cat6 only supports 10G at 55m."},
{q:"Full-duplex means what?",o:["Only one direction at a time","Simultaneous send and receive","Half the bandwidth","Only receiving"],a:1,e:"Full-duplex = simultaneous bidirectional communication. No collision domain needed."},
{q:"Which connector type is used for single-mode fiber?",o:["RJ-45","SC/LC","BNC","DB-9"],a:1,e:"SC and LC connectors are common for fiber optic connections (both single-mode and multimode)."},
{q:"What type of cable connects a switch to another switch (using old standards)?",o:["Straight-through","Crossover","Rollover","Console"],a:1,e:"Crossover cables connect like devices (switch-to-switch, router-to-router). Modern devices often auto-detect (Auto-MDIX)."},
{q:"What cable connects a PC to a switch?",o:["Straight-through","Crossover","Rollover","Coaxial"],a:0,e:"Straight-through cables connect unlike devices (PC to switch, switch to router)."},
{q:"What is Auto-MDIX?",o:["Automatic VLAN assignment","Automatic cable type detection and adjustment","Automatic duplex negotiation","Automatic IP assignment"],a:1,e:"Auto-MDIX detects cable type (straight/crossover) and adjusts automatically — no manual cable selection needed."},
{q:"1000BASE-LX uses which fiber type?",o:["Multimode only","Single-mode only","Both single and multimode","Copper"],a:2,e:"1000BASE-LX supports both single-mode (up to 10km) and multimode fiber (550m with conditioning cable)."},
{q:"Which physical topology has a single point of failure at the central device?",o:["Mesh","Ring","Star","Bus"],a:2,e:"Star topology has all devices connected to a central switch/hub. If the central device fails, all connections are lost."},
{q:"What does PoE (Power over Ethernet) do?",o:["Increases speed","Provides power and data over Ethernet cable","Encrypts data","Creates VLANs"],a:1,e:"PoE delivers electrical power along with data over standard Ethernet cables — used for IP phones, APs, cameras."},
{q:"Which standard defines PoE+ with up to 30W per port?",o:["802.3af","802.3at","802.3bt","802.3ad"],a:1,e:"802.3af = 15.4W, 802.3at (PoE+) = 30W, 802.3bt (PoE++) = up to 90W."},
]},

{id:11,name:"Cisco Device Functions",q:[
{q:"SVIs provide what capability on a Layer 3 switch?",o:["Spanning tree","Inter-VLAN routing","Port mirroring","Link aggregation"],a:1,e:"Switch Virtual Interfaces enable inter-VLAN routing directly on a Layer 3 switch."},
{q:"VLANs reduce what in a Layer 2 network?",o:["Collision domains","Broadcast domain size","Cable length","Bandwidth"],a:1,e:"VLANs segment broadcast domains, reducing broadcast traffic scope."},
{q:"A Layer 3 switch combines what two device functions?",o:["Hub and switch","Switch and router","Router and firewall","Switch and access point"],a:1,e:"Layer 3 switches perform both Layer 2 switching and Layer 3 routing."},
{q:"Which device operates at all 7 OSI layers?",o:["Hub","Switch","Router","Firewall/Application Gateway"],a:3,e:"Next-gen firewalls and application gateways can inspect traffic at all OSI layers."},
{q:"A hub operates at which OSI layer?",o:["Layer 1","Layer 2","Layer 3","Layer 4"],a:0,e:"Hubs are Layer 1 devices — they simply repeat electrical signals to all ports."},
{q:"What does a hub do with a received frame?",o:["Forwards to destination only","Floods to all ports including source","Floods to all ports except source","Drops it"],a:2,e:"Hubs flood frames to all ports except the source — no intelligence about MAC addresses."},
{q:"A multilayer switch can replace what in inter-VLAN routing?",o:["Firewall","Router-on-a-stick","DNS server","DHCP server"],a:1,e:"A multilayer (L3) switch with SVIs eliminates the need for a separate router-on-a-stick for inter-VLAN routing."},
{q:"Which device creates separate collision domains per port?",o:["Hub","Repeater","Switch","Bridge and Switch"],a:3,e:"Both bridges and switches create separate collision domains per port. Switches are essentially multiport bridges."},
{q:"Which Cisco feature discovers directly connected neighbors?",o:["ARP","CDP","STP","VTP"],a:1,e:"CDP (Cisco Discovery Protocol) discovers directly connected Cisco devices and shares device info."},
{q:"LLDP is the standard equivalent of which Cisco protocol?",o:["VTP","DTP","CDP","PAgP"],a:2,e:"LLDP (Link Layer Discovery Protocol) is the IEEE standard equivalent of Cisco's proprietary CDP."},
{q:"What does a wireless access point function as?",o:["Layer 1 repeater","Layer 2 bridge between wired and wireless","Layer 3 router","Layer 4 gateway"],a:1,e:"An AP bridges wireless clients to the wired network at Layer 2."},
{q:"Which device type is best for connecting different network segments with different IP subnets?",o:["Hub","Switch","Router","Repeater"],a:2,e:"Routers connect different IP subnets and make forwarding decisions based on destination IP addresses."},
{q:"What is the purpose of a console cable?",o:["Connect switches together","Direct device management access","WAN connectivity","PoE delivery"],a:1,e:"Console cables (rollover) provide direct CLI access to a device for initial configuration and troubleshooting."},
{q:"Which command shows CDP neighbor details?",o:["show cdp","show cdp neighbors detail","show neighbors","show lldp"],a:1,e:"'show cdp neighbors detail' shows connected Cisco devices with IPs, platform, and capabilities."},
{q:"What information does CDP NOT share?",o:["Device hostname","IP address","VLAN membership","Platform/model"],a:2,e:"CDP shares hostname, IP, platform, IOS version, capabilities, and native VLAN — but not full VLAN membership details."},
]},

{id:12,name:"The Life of a Packet",q:[
{q:"ARP translates what to what?",o:["MAC to IP","IP to MAC","IP to hostname","Hostname to IP"],a:1,e:"ARP resolves IP→MAC for local communication."},
{q:"Host communicating externally ARPs for which address?",o:["Destination IP","External IP","Default gateway IP","Own IP"],a:2,e:"For external traffic, the host needs the gateway's MAC to forward packets."},
{q:"What does a router do when it receives a packet?",o:["Checks source MAC","Checks destination IP against routing table","Floods to all interfaces","Checks source IP against ARP table"],a:1,e:"Routers examine the destination IP and consult the routing table to determine the next hop."},
{q:"When a router forwards a packet, which header field does it change?",o:["Source IP","Destination IP","Source and destination MAC addresses","TTL and MAC addresses"],a:3,e:"Routers decrement TTL and rewrite the Layer 2 (MAC) headers for each hop. Layer 3 IPs remain unchanged."},
{q:"What happens to TTL at each router hop?",o:["Increases by 1","Decreases by 1","Stays the same","Resets to 255"],a:1,e:"TTL decrements by 1 at each router. When it reaches 0, the packet is discarded."},
{q:"If TTL reaches 0, the router sends what message back?",o:["ARP reply","ICMP Time Exceeded","ICMP Redirect","TCP RST"],a:1,e:"ICMP Type 11 (Time Exceeded) is sent back to the source when TTL reaches 0."},
{q:"In the packet lifecycle, which device changes the Layer 2 header at each hop?",o:["Switch","Hub","Router","Firewall"],a:2,e:"Routers strip the L2 header, make routing decisions at L3, then create a new L2 header for the next segment."},
{q:"When a frame arrives at a switch, what does the switch check first?",o:["Source IP","Destination MAC address","TTL","VLAN tag"],a:1,e:"Switches check the destination MAC against their MAC address table to determine the outgoing port."},
{q:"Which table does a switch use to forward frames?",o:["Routing table","ARP table","MAC address table","NAT table"],a:2,e:"The MAC address table (CAM table) maps MAC addresses to switch ports for frame forwarding."},
{q:"What does a switch learn from incoming frames?",o:["Destination MAC and port","Source MAC and ingress port","IP addresses","VLAN configurations"],a:1,e:"Switches learn by recording the source MAC address and the port it arrived on."},
{q:"When a PC pings a server on a different subnet, what is the destination MAC in the frame leaving the PC?",o:["Server's MAC","PC's own MAC","Default gateway's MAC","Broadcast MAC"],a:2,e:"The PC uses ARP to find the gateway's MAC and sends the frame with the gateway's MAC as destination."},
{q:"A proxy ARP occurs when what happens?",o:["A router responds to ARP requests on behalf of devices on another network","A switch responds to ARP","ARP is encrypted","ARP table is full"],a:0,e:"Proxy ARP allows a router to answer ARP requests for hosts on different subnets, making them appear local."},
{q:"What is the destination MAC for a broadcast frame?",o:["00:00:00:00:00:00","FF:FF:FF:FF:FF:FF","01:00:5E:00:00:01","The sender's own MAC"],a:1,e:"Broadcast = FF:FF:FF:FF:FF:FF (all ones). Received by all devices on the local segment."},
{q:"Which address type does NOT exist in IPv6?",o:["Unicast","Anycast","Broadcast","Multicast"],a:2,e:"IPv6 eliminates broadcast. It uses multicast (and solicited-node multicast) instead."},
{q:"Gratuitous ARP is used for what?",o:["Resolving unknown addresses","Announcing an IP-MAC binding or detecting duplicates","Encrypting ARP traffic","Routing between subnets"],a:1,e:"Gratuitous ARP announces a device's own IP-MAC binding and detects duplicate IP addresses."},
]},

{id:13,name:"The Cisco Troubleshooting Methodology",q:[
{q:"Which commands diagnose VLAN and interface issues on a switch?",o:["show version; show protocols; show ip route","show ip interface brief; show running-config; show access-list","show vlan brief; show interfaces status; show mac address-table","show startup-config; show ip arp; show cdp neighbors"],a:2,e:"show vlan brief + show interfaces status + show mac address-table cover VLAN, port, and connectivity diagnostics."},
{q:"Missing interface in 'show vlan brief': which command troubleshoots?",o:["show run interface","show mac address-table","show spanning-tree","show interfaces switchport"],a:3,e:"'show interfaces switchport' shows VLAN assignment and switchport mode — explains why a port isn't in the expected VLAN."},
{q:"Suspecting OSPF routing loop: which debug command helps?",o:["debug ip ospf events","route poisons","Wireshark captures","Routing policy filters"],a:0,e:"'debug ip ospf events' shows real-time OSPF process activities for granular loop diagnosis."},
{q:"Which troubleshooting approach follows a structured top-down methodology?",o:["Start at physical layer, work up","Start at application layer, work down","Test random layers","Replace hardware first"],a:1,e:"Top-down starts at Application layer and works down through the OSI layers to find the issue."},
{q:"Bottom-up troubleshooting starts where?",o:["Application layer","Network layer","Physical layer","Transport layer"],a:2,e:"Bottom-up starts at the Physical layer (cables, lights, connections) and works upward."},
{q:"'show ip route' is useful for troubleshooting what?",o:["VLAN assignments","Layer 3 routing decisions","MAC address learning","Physical connectivity"],a:1,e:"'show ip route' displays the routing table — essential for verifying routing paths and troubleshooting connectivity."},
{q:"Which command tests Layer 3 reachability?",o:["show interfaces","ping","show mac address-table","show vlan"],a:1,e:"Ping sends ICMP echo requests to test IP-level (Layer 3) reachability."},
{q:"Which command identifies where packets are being dropped along a path?",o:["ping","traceroute","show ip route","show arp"],a:1,e:"Traceroute identifies each hop and shows where the path fails or has high latency."},
{q:"A switch port shows 'err-disabled'. What should you check first?",o:["IP addressing","Port security violations","Default gateway","DNS settings"],a:1,e:"err-disabled is commonly caused by port security violations, BPDU guard, or other security features."},
{q:"'show logging' helps with what?",o:["VLAN configuration","Historical event messages and errors","Interface speeds","MAC addresses"],a:1,e:"'show logging' displays system messages — useful for identifying when and why issues occurred."},
{q:"Which approach is best for intermittent issues?",o:["Divide and conquer","Replace all cables","Reboot all devices","Top-down only"],a:0,e:"Divide and conquer targets the most likely layer first, then narrows up or down based on results."},
{q:"Which command verifies Layer 1 and 2 interface status?",o:["show ip route","show interfaces","ping","traceroute"],a:1,e:"'show interfaces' displays physical (L1) and data-link (L2) status, speed, duplex, errors, and counters."},
{q:"Late collisions on a switch port typically indicate what?",o:["Cable too long or duplex mismatch","VLAN mismatch","Incorrect IP address","STP issue"],a:0,e:"Late collisions usually indicate cables exceeding maximum length or duplex mismatches."},
{q:"Input errors on an interface include which counters?",o:["CRC, frame, overrun, ignored","Output drops, collisions","Packets sent, bytes sent","VLAN mismatches"],a:0,e:"Input error counters: CRC errors, frame errors, overruns, and ignored packets indicate physical or configuration issues."},
{q:"Which command clears interface counters for fresh troubleshooting?",o:["clear counters","reset interface","default interface","clear arp"],a:0,e:"'clear counters' resets all interface statistics to zero for a fresh measurement baseline."},
]},

{id:14,name:"Cisco Router and Switch Basics",q:[
{q:"'show interfaces trunk' verifies what?",o:["VLAN membership","Trunk link status, mode, and allowed VLANs","IP addressing","STP topology"],a:1,e:"Shows trunk details: mode, encapsulation, native VLAN, and allowed VLANs."},
{q:"Which command checks for VLAN mismatches between connected switches?",o:["show interface trunk","show vlan brief","show spanning-tree detail","show running-config interface"],a:0,e:"'show interface trunk' reveals allowed VLANs and native VLAN — essential for finding mismatches."},
{q:"What does 'show ip interface brief' display?",o:["Detailed interface config","Summary of interfaces with IP and status","Routing table","ARP table"],a:1,e:"Shows a concise table: interface name, IP address, OK/Method, Status, and Protocol for all interfaces."},
{q:"Which mode is a switch port in by default on most Cisco switches?",o:["Trunk","Access","Dynamic auto","Dynamic desirable"],a:2,e:"Most Cisco switches default to 'dynamic auto' — the port waits for the other side to initiate trunking."},
{q:"What does 'switchport mode access' do?",o:["Creates a trunk port","Forces the port to access mode for a single VLAN","Enables DTP","Disables the port"],a:1,e:"'switchport mode access' configures the port for a single VLAN — no trunk negotiation."},
{q:"What does 'switchport nonegotiate' do?",o:["Disables the port","Disables DTP negotiation on the port","Forces access mode","Enables trunking"],a:1,e:"'switchport nonegotiate' prevents the port from sending DTP frames, mitigating VLAN hopping."},
{q:"Which command assigns a port to VLAN 10?",o:["vlan 10","switchport access vlan 10","switchport trunk vlan 10","interface vlan 10"],a:1,e:"'switchport access vlan 10' assigns the access port to VLAN 10."},
{q:"What does 'interface vlan 10' create?",o:["An access port in VLAN 10","A trunk port for VLAN 10","A Switch Virtual Interface (SVI) for VLAN 10","A physical interface"],a:2,e:"'interface vlan 10' creates an SVI — a Layer 3 interface for managing the switch or inter-VLAN routing."},
{q:"Which command shows the MAC address table on a switch?",o:["show arp","show mac address-table","show ip route","show vlan"],a:1,e:"'show mac address-table' displays learned MAC addresses, VLANs, and associated ports."},
{q:"How does a switch learn MAC addresses?",o:["From destination MAC of frames","From source MAC of received frames","From ARP requests","From CDP messages"],a:1,e:"Switches learn by examining the SOURCE MAC of incoming frames and mapping them to the ingress port."},
{q:"What is the aging time for MAC address table entries by default?",o:["30 seconds","60 seconds","300 seconds (5 minutes)","600 seconds"],a:2,e:"Default MAC aging time is 300 seconds (5 minutes). After this, unused entries are removed."},
{q:"Which register value causes a router to ignore startup-config on boot?",o:["0x2102","0x2142","0x2100","0x0000"],a:1,e:"0x2142 bypasses startup-config on boot — used for password recovery. Normal value is 0x2102."},
{q:"Where is the IOS image stored?",o:["NVRAM","Flash","RAM","ROM"],a:1,e:"The IOS image is stored in Flash memory. RAM holds the running config and active processes."},
{q:"What does ROM contain on a Cisco device?",o:["Running configuration","IOS image","POST and bootstrap code","Startup configuration"],a:2,e:"ROM contains POST (Power-On Self Test), bootstrap loader, and ROMMON for recovery."},
{q:"'show running-config' displays what?",o:["Config stored in NVRAM","Currently active config in RAM","Config stored in Flash","Boot config in ROM"],a:1,e:"Running-config is the currently active configuration stored in RAM."},
]},

{id:15,name:"Cisco Device Management",q:[
{q:"'snmp-server host' does what?",o:["Creates SNMP user","Sets remote host for SNMP traps","Enables SNMP globally","Creates SNMP view"],a:1,e:"'snmp-server host' specifies where to send SNMP traps/informs."},
{q:"GetBulkRequest retrieves what?",o:["Single variable","Large data sets efficiently","SNMP configuration","Agent status"],a:1,e:"GetBulkRequest retrieves multiple data points in one request (SNMPv2+)."},
{q:"'ntp server 192.168.1.1 key 1' does what?",o:["Creates NTP peer","Configures unicast NTP with authentication","Broadcasts NTP","Sets timezone"],a:1,e:"Configures unicast NTP sync with authentication key."},
{q:"NTP authentication uses what mechanism?",o:["Timestamp matching","MD5 hash comparison","Digital certificates","IP source filtering"],a:1,e:"Router compares received MD5 hash with stored key value."},
{q:"SNMP community string 'public' with ro access restricted to 192.168.10.0/24?",o:["snmp-server community public ro 192.168.10.0 0.0.0.255","snmp-server community public ro 192.168.10.0 0.0.255.255","snmp-server community public ro ACL 10","snmp-server community public ro 192.168.10.0 255.255.255.0"],a:0,e:"Uses wildcard mask 0.0.0.255 to match the /24 subnet."},
{q:"SNMPv3 highest security: which auth and encryption?",o:["SHA + AES 128","SHA + AES 256","MD5 + AES 256","SHA + DES"],a:1,e:"SHA for authentication + AES 256 for encryption = maximum SNMPv3 security."},
{q:"'ntp master 1' does what?",o:["Syncs with external server","Makes router an authoritative NTP server at stratum 1","Creates NTP peer","Enables NTP authentication"],a:1,e:"Makes the local router act as the primary time source."},
{q:"IP SLA Path Jitter measures what?",o:["Round-trip time only","Jitter, latency, and packet loss","TCP connection time","DNS resolution time"],a:1,e:"Path Jitter specifically measures jitter variation, latency, and packet loss."},
{q:"IP SLA requires what on the target device?",o:["SNMP agent","IP SLA responder enabled","Static route","NTP sync"],a:1,e:"The target device needs 'ip sla responder' enabled for accurate measurements."},
{q:"IP SLA on Layer 3 switch between VLANs: correct source interface?",o:["GigabitEthernet physical port","VLAN SVI","Loopback interface","Serial interface"],a:1,e:"Use VLAN SVI as source for inter-VLAN RTT measurement on a Layer 3 switch."},
{q:"Syslog severity level 0 means what?",o:["Debugging","Informational","Warning","Emergency"],a:3,e:"Level 0=Emergency (system unusable). Level 7=Debugging. Lower number=more critical."},
{q:"Which syslog command sends messages to a server?",o:["logging host <IP>","syslog server <IP>","logging trap <IP>","debug logging <IP>"],a:0,e:"'logging host <IP>' specifies the syslog server destination."},
{q:"'logging trap warnings' sends which severity levels?",o:["Only warnings","Warnings and above (0-4)","Everything","Only emergencies"],a:1,e:"'logging trap <level>' sends messages at that level and more critical (lower numbers)."},
{q:"TFTP uses which port?",o:["TCP 20","UDP 69","TCP 69","UDP 68"],a:1,e:"TFTP uses UDP port 69 for simple file transfers."},
{q:"Which command copies IOS from TFTP to flash?",o:["copy tftp flash","copy flash tftp","copy running-config tftp","copy startup-config flash"],a:0,e:"'copy tftp flash' downloads an IOS image from a TFTP server to the device's flash memory."},
]},

{id:16,name:"Routing Fundamentals",q:[
{q:"Default static route command via next-hop 10.1.1.1?",o:["route add 0.0.0.0 gw 10.1.1.1","ip default-gateway 10.1.1.1","ip route 0.0.0.0 0.0.0.0 10.1.1.1","ip route 192.168.1.0 255.255.255.0 10.1.1.1"],a:2,e:"ip route 0.0.0.0 0.0.0.0 <next-hop> creates the default route."},
{q:"Static route via unreachable next-hop: what happens?",o:["Route installed anyway","Route not installed in routing table","Route installed but inactive","Error message generated"],a:1,e:"Cisco requires next-hop reachability for static route installation."},
{q:"Floating static route with AD 150: when does it activate?",o:["Always active","When primary route fails","When manually enabled","During maintenance windows"],a:1,e:"AD 150 > any dynamic protocol AD, so it only activates when the preferred route disappears."},
{q:"Route to 10.1.1.0/24 via 192.168.1.1: correct command?",o:["ip route 192.168.1.0 255.255.255.0 10.1.1.1","ip route 192.168.1.0 serial 0/0/0","ip route 10.1.1.0 255.255.255.0 serial 0/0/0","ip route 10.1.1.0 255.255.255.0 192.168.1.1"],a:3,e:"ip route [destination] [mask] [next-hop]. Destination=10.1.1.0, next-hop=192.168.1.1."},
{q:"Static route not in routing table. Most common cause?",o:["Default route takes precedence","Next-hop unreachable","Wrong subnet mask","Different VLANs"],a:1,e:"Static routes require reachable next-hops to be installed."},
{q:"Some static routes installed, others ignored. Why?",o:["Same AD as dynamic routes","Routes conflict","Higher AD than default","Next-hop addresses unreachable"],a:3,e:"Only routes with reachable/valid next-hops get installed."},
{q:"Circular static routes (A→B→C→A) cause what?",o:["Load balancing","Routing loop","Increased bandwidth","Redundancy"],a:1,e:"Circular references create a routing loop — packets circulate endlessly."},
{q:"Which routing decision is made first?",o:["Longest prefix match","Administrative distance","Metric","Next-hop availability"],a:0,e:"Longest prefix match is the first criterion — most specific route wins."},
{q:"What does 'ip route 0.0.0.0 0.0.0.0 serial0/0' do differently than using a next-hop IP?",o:["No difference","Uses exit interface instead of next-hop IP","Creates a floating route","Disables the interface"],a:1,e:"Specifying an exit interface means the router sends directly out that interface; ARP is used on broadcast networks."},
{q:"'ip default-gateway' is used on what type of device?",o:["Router in routing mode","Switch with no IP routing enabled","Layer 3 switch","Wireless AP"],a:1,e:"'ip default-gateway' is for Layer 2 switches (or routers with IP routing disabled) — it specifies where to send management traffic."},
{q:"What is the AD of a static route pointing to a next-hop IP?",o:["0","1","5","90"],a:1,e:"Static routes have AD=1 by default. Static routes to an exit interface have AD=0."},
{q:"What is a gateway of last resort?",o:["HSRP virtual IP","Default route (0.0.0.0/0)","Primary DNS server","Management VLAN gateway"],a:1,e:"Gateway of last resort is the default route used when no more specific route matches."},
{q:"Which command shows the gateway of last resort?",o:["show ip default-gateway","show ip route","show ip interface brief","show ip protocols"],a:1,e:"'show ip route' displays the full routing table including the gateway of last resort."},
{q:"Two routes exist: one specific (/24) and one summary (/16). Which is used?",o:["Summary route","Specific route","Both for load balancing","Neither"],a:1,e:"Longest prefix match: /24 is more specific than /16, so it wins."},
{q:"What makes a route 'recursive'?",o:["It points to another route for next-hop resolution","It loops back to itself","It uses multiple protocols","It has multiple next-hops"],a:0,e:"Recursive routes require the router to do another lookup to find how to reach the next-hop IP."},
]},

{id:17,name:"Dynamic Routing Protocols",q:[
{q:"OSPF determines best path using what metric?",o:["Delay","Hop count","Cost (based on bandwidth)","Administrative distance"],a:2,e:"OSPF cost is inversely proportional to bandwidth. Lower cost = preferred."},
{q:"EIGRP default metric components?",o:["Hop Count","Cost","MTU","Bandwidth and Delay"],a:3,e:"EIGRP uses bandwidth and delay by default. K1(bandwidth)=1, K3(delay)=1, others=0."},
{q:"Link-state vs distance-vector: when is link-state better?",o:["Flat network","When complete topology view prevents routing loops","When simplicity is priority","When minimizing update bandwidth"],a:1,e:"Link-state protocols maintain full topology maps — better for large, complex networks."},
{q:"Which protocol handles dual-stack (IPv4+IPv6) routing updates?",o:["RIPng","OSPFv2","EIGRP","BGP"],a:3,e:"BGP multiprotocol extensions handle both address families."},
{q:"'show ip protocols' verifies what for EIGRP?",o:["Neighbor states","K-values and metric configuration","Interface status","Routing table"],a:1,e:"Shows protocol state including K-values, networks, AD, and redistribution."},
{q:"What is the AD of RIP?",o:["90","100","110","120"],a:3,e:"RIP=120, EIGRP=90, OSPF=110, eBGP=20, iBGP=200."},
{q:"What type of routing protocol is OSPF?",o:["Distance vector","Link-state","Path vector","Hybrid"],a:1,e:"OSPF is a link-state protocol using Dijkstra's SPF algorithm."},
{q:"What type of protocol is EIGRP?",o:["Distance vector","Link-state","Path vector","Advanced distance vector (hybrid)"],a:3,e:"EIGRP is an advanced distance vector (hybrid) protocol using DUAL algorithm."},
{q:"What type of protocol is BGP?",o:["Distance vector","Link-state","Path vector","Hybrid"],a:2,e:"BGP is a path vector protocol used for inter-AS routing."},
{q:"What does convergence mean in routing?",o:["All routers powered on","All routers have consistent, accurate routing tables","All interfaces are up","All VLANs are configured"],a:1,e:"Convergence = all routers in the network have consistent, up-to-date routing tables."},
{q:"Which routing protocol uses hop count as its only metric?",o:["OSPF","EIGRP","RIP","BGP"],a:2,e:"RIP uses hop count only, with a maximum of 15 hops (16=unreachable)."},
{q:"What is the maximum hop count in RIP?",o:["8","15","32","255"],a:1,e:"RIP max=15 hops. 16=unreachable. This limits RIP to small networks."},
{q:"What is split horizon?",o:["Dividing areas in OSPF","Not advertising routes back out the interface they were learned on","Splitting routing tables","Separate forwarding planes"],a:1,e:"Split horizon prevents routing loops by not advertising a route back toward its source."},
{q:"Which timer determines how long a router waits before declaring a neighbor dead in OSPF?",o:["Hello timer","Dead timer","Hold timer","SPF timer"],a:1,e:"Dead timer (4x hello by default). If no hello received within dead interval, neighbor is declared down."},
{q:"OSPF hello interval default on broadcast networks?",o:["5 seconds","10 seconds","30 seconds","40 seconds"],a:1,e:"OSPF hello=10 seconds on broadcast/point-to-point. Dead=40 seconds (4x hello)."},
]},

{id:18,name:"Connectivity Troubleshooting",q:[
{q:"Which command traces packet path to destination?",o:["show ip route","ping","show cdp neighbors","traceroute"],a:3,e:"Traceroute shows each hop along the path."},
{q:"Interface down prevents static route from working. Why?",o:["Max routes exceeded","Not in routing protocol","Exit interface is down","Subnet mismatch"],a:2,e:"Invalid exit interface = invalid route."},
{q:"R1 has static default to R2. R2 has OSPF default. What happens to unknown traffic from R1?",o:["R1 forwards locally","Dropped—different subnets","R1→R2 via static, R2 forwards via OSPF","Dropped on R1"],a:2,e:"R1 uses static default to R2. R2 uses OSPF default for further forwarding."},
{q:"CEF table doesn't match FIB. Primary cause?",o:["CEF switching disabled","Misconfigured routing protocols","Packet loss","Outdated ARP entries"],a:0,e:"Disabled CEF = FIB not synchronized with routing table."},
{q:"'show ip arp' displays what?",o:["Routing table","IP-to-MAC address mappings","VLAN assignments","Interface status"],a:1,e:"Shows the ARP cache with IP-to-MAC bindings and associated interfaces."},
{q:"Duplicate IP address on network. Which command detects it?",o:["show ip route","show ip arp","show ip interface brief","ping"],a:1,e:"Duplicate IPs create multiple ARP entries for the same IP — visible in 'show ip arp'."},
{q:"One-way communication issue. Most likely cause?",o:["DNS failure","Asymmetric routing or missing return route","VLAN mismatch","NTP desync"],a:1,e:"One-way communication typically means the return path is missing or different."},
{q:"'show ip cef' displays what?",o:["Interface status","CEF forwarding table","ARP cache","OSPF database"],a:1,e:"Shows the Cisco Express Forwarding table used for high-speed packet forwarding."},
{q:"Which command shows real-time interface error counters?",o:["show ip route","show interfaces","show vlan","show arp"],a:1,e:"'show interfaces' includes input/output errors, CRC errors, collisions, and other counters."},
{q:"Packet being dropped at a specific hop. Best tool?",o:["ping","traceroute","show ip route","show arp"],a:1,e:"Traceroute identifies exactly which hop is dropping or delaying packets."},
{q:"DNS resolution fails but IP connectivity works. Issue is at which layer?",o:["Layer 1","Layer 2","Layer 3","Layer 7 (Application)"],a:3,e:"IP works (L3 OK) but DNS fails = Application layer issue."},
{q:"'ping' succeeds but web browsing fails. What should you check?",o:["Physical cables","VLAN configuration","DNS resolution and firewall rules","Spanning tree"],a:2,e:"ICMP works but HTTP doesn't = likely DNS issue or firewall blocking port 80/443."},
{q:"High interface resets indicate what?",o:["Normal operation","Keepalive failures or cable issues","VLAN mismatch","ARP problems"],a:1,e:"Interface resets often indicate keepalive failures, carrier transitions, or physical layer problems."},
{q:"Which command verifies DNS configuration on a router?",o:["show ip route","show ip dns","show hosts","show ip name-server"],a:2,e:"'show hosts' displays DNS cache and configured name servers."},
{q:"'clear ip route *' does what?",o:["Deletes all static routes","Flushes and rebuilds the entire routing table","Clears ARP cache","Resets interfaces"],a:1,e:"Forces the router to rebuild the routing table from scratch — useful after routing changes."},
]},

{id:19,name:"IGP Fundamentals",q:[
{q:"Which protocol handles IPv4+IPv6 in single update for large networks?",o:["RIPng","OSPFv2","EIGRP","BGP"],a:3,e:"BGP multiprotocol extensions handle both address families."},
{q:"OSPF uses which algorithm?",o:["Bellman-Ford","Dijkstra SPF","DUAL","Path vector"],a:1,e:"OSPF uses Dijkstra's Shortest Path First algorithm."},
{q:"What is an autonomous system?",o:["A single router","Collection of networks under single administrative control","VLAN group","Spanning tree instance"],a:1,e:"An AS is a collection of networks managed by a single organization sharing a routing policy."},
{q:"IGP vs EGP: which is used within an AS?",o:["EGP","IGP","Both equally","Neither"],a:1,e:"IGP (Interior Gateway Protocol) is used within an AS. EGP (like BGP) is used between ASs."},
{q:"Examples of IGPs include what?",o:["OSPF, EIGRP, RIP","BGP, OSPF, RIP","BGP only","MPLS, BGP"],a:0,e:"OSPF, EIGRP, and RIP are Interior Gateway Protocols used within autonomous systems."},
{q:"Which protocol is an EGP?",o:["OSPF","EIGRP","RIP","BGP"],a:3,e:"BGP (Border Gateway Protocol) is the only EGP in common use today."},
{q:"Classful routing protocols have what limitation?",o:["Support VLSM","Don't carry subnet mask information in updates","Use link-state","Support authentication"],a:1,e:"Classful protocols (RIPv1, IGRP) don't include subnet masks in updates — can't support VLSM."},
{q:"Classless routing protocols support what?",o:["Only default masks","VLSM and CIDR","Only classful addresses","Only IPv6"],a:1,e:"Classless protocols (RIPv2, OSPF, EIGRP) include subnet masks, supporting VLSM and CIDR."},
{q:"Which is a classful routing protocol?",o:["OSPF","EIGRP","RIPv1","RIPv2"],a:2,e:"RIPv1 is classful — doesn't carry subnet masks. RIPv2 is classless."},
{q:"What does VLSM allow?",o:["Single subnet mask for all subnets","Different subnet masks within the same network","Only /24 masks","IPv6 addressing"],a:1,e:"VLSM = Variable Length Subnet Masking — different-sized subnets within the same network."},
{q:"Route redistribution is what?",o:["Sharing routes between different routing protocols","Balancing traffic across links","Summarizing routes","Filtering routes"],a:0,e:"Redistribution shares route information between different routing protocols (e.g., OSPF into EIGRP)."},
{q:"What problem can redistribution cause?",o:["Faster convergence","Routing loops","Better load balancing","Reduced routing tables"],a:1,e:"Improper redistribution can create routing loops if not carefully managed with route maps or distribute lists."},
{q:"Passive interface in routing protocols means what?",o:["Interface is shut down","Interface receives but doesn't send routing updates","Interface is in standby","Interface forwards only broadcast"],a:1,e:"Passive interface doesn't send routing updates out that interface — but still advertises the connected network."},
{q:"'router ospf 1' — what is the '1'?",o:["Area ID","Process ID","Priority","Cost"],a:1,e:"The number after 'router ospf' is the process ID — locally significant, doesn't need to match between routers."},
{q:"Which command shows all running routing protocols?",o:["show ip route","show ip protocols","show ip ospf","show ip eigrp"],a:1,e:"'show ip protocols' displays all active routing protocols, their settings, networks, and timers."},
]},

{id:20,name:"OSPF",q:[
{q:"LSA at MaxAge: what does the router do?",o:["Ignores it","Increments age","Recalculates immediately","Flushes and floods with MaxAge"],a:3,e:"MaxAge LSAs are flushed from all databases across the OSPF domain."},
{q:"Which LSA type do ABRs generate for inter-area routes?",o:["Type 3","Type 1","Type 2","Type 4"],a:0,e:"Type 3 Summary LSAs advertise routes between OSPF areas."},
{q:"Type 5 LSAs: purpose and flooding scope?",o:["Internal area traffic","External routes, all areas except stub","Internal router info","Inter-area routing"],a:1,e:"Type 5 = external routes from ASBRs, flooded everywhere except stub areas."},
{q:"DR generates which LSA type on multi-access networks?",o:["Type 3","Type 4","Type 1","Type 2"],a:3,e:"Type 2 Network LSA represents the multi-access segment."},
{q:"OSPF Router ID serves what purpose?",o:["Highest IP on active interfaces","Unique identifier for each router","Area assignment","Adjacency establishment"],a:1,e:"RID uniquely identifies each router for LSA processing and SPF."},
{q:"2-Way state on broadcast network is normal when?",o:["Hello/dead mismatch","Different subnets","Router is not DR/BDR","Network type mismatch"],a:2,e:"Non-DR/BDR routers stay in 2-Way on broadcast networks — this is normal."},
{q:"Neighbor stuck in INIT. Likely cause?",o:["Mismatched subnet masks","No authentication","Wrong network types","Bad MTU"],a:0,e:"Mismatched masks prevent INIT→2-Way transition."},
{q:"DR/BDR elections failing on point-to-point link. Cause?",o:["Hello/dead mismatch","IP conflict","Wrong area","Network type mismatch"],a:3,e:"Point-to-point links shouldn't have DR/BDR elections — if they do, network type is wrong."},
{q:"'debug ip ospf adj' is for what?",o:["Viewing routes","Interface details","Neighbor details","Real-time adjacency debugging"],a:3,e:"Provides real-time OSPF adjacency troubleshooting info."},
{q:"DBD exchange stuck in ExStart. Cause?",o:["No authentication","MTU mismatch","Duplicate router IDs","Wrong command"],a:1,e:"MTU mismatch causes DBD exchange to fail at ExStart/Exchange state."},
{q:"Type 7 LSAs in NSSA areas: what happens at ABR?",o:["Converted to Type 5","Dropped","Converted to Type 3","Kept as Type 7"],a:0,e:"ABRs convert Type 7→Type 5 for propagation to other areas."},
{q:"Point-to-multipoint OSPF: why choose it over NBMA?",o:["Dynamic IP support","More areas","No DR/BDR election needed","Less OSPF traffic"],a:2,e:"Point-to-multipoint treats each connection as separate P2P — no DR/BDR needed."},
{q:"Totally stubby area: why no Type 3 LSAs?",o:["Area type blocks them by design","Non-unique RID","Lower cost to neighbors","Timer mismatch"],a:0,e:"Totally stubby areas filter Type 3, 4, and 5 LSAs — only default route allowed."},
{q:"OSPF Down→Init transition triggered by what?",o:["Receiving valid Hello","Sending Hello","DR election","SPF calculation"],a:0,e:"Receiving a valid Hello triggers the Down→Init transition."},
{q:"For stable OSPF adjacency, what MUST match?",o:["Hello and dead intervals","Router IDs","Interface subnet masks","Process IDs"],a:0,e:"Hello/dead intervals must match. Also area ID, authentication, and stub flags."},
{q:"2WAY/DROTHER means what?",o:["Master/Slave negotiated","No bidirectional communication","Bidirectional established; neighbor is not DR/BDR","Electing new DR"],a:2,e:"Normal state for non-DR/BDR neighbors on broadcast networks."},
{q:"ABR misconfigured between stub/totally stubby areas: effect?",o:["No impact","Prevents proper LSA filtering and route propagation","Increases bandwidth","Improves convergence"],a:1,e:"ABR misconfiguration disrupts LSA filtering critical for stub area operation."},
{q:"OSPF cost formula?",o:["Hop count","Reference bandwidth / interface bandwidth","Delay * bandwidth","MTU / bandwidth"],a:1,e:"Cost = Reference BW (default 100 Mbps) / Interface BW. Lower cost = preferred."},
{q:"Which command changes OSPF cost on an interface?",o:["ip ospf priority","ip ospf cost <value>","ip ospf hello-interval","ip ospf network"],a:1,e:"'ip ospf cost <value>' manually sets the OSPF cost for that interface."},
{q:"OSPF area 0 is called what?",o:["Stub area","Backbone area","Transit area","NSSA"],a:1,e:"Area 0 is the backbone — all other areas must connect to it (directly or via virtual link)."},
]},

{id:21,name:"VLANs",q:[
{q:"VTP dynamically learns VLAN info from switches in same what?",o:["Area","Domain","Zone","Cluster"],a:1,e:"VTP domain — all switches in the same VTP domain share VLAN info."},
{q:"VTP primary purpose?",o:["Automate VLAN configuration across network","Improve switch speed","Backup paths","ACL security"],a:0,e:"VTP automates VLAN propagation across the network."},
{q:"'switchport mode dynamic auto': behavior?",o:["Initiates trunking","Passively waits for trunk negotiation","Forces trunk","Forces access"],a:1,e:"Dynamic auto passively waits — only forms trunk if the other side is desirable or trunk."},
{q:"Switch drops frames with unrecognized VLAN ID. Why?",o:["VLAN not in allowed list","Security feature","Error in frame","Default behavior for isolation"],a:3,e:"Switches drop unknown VLAN-tagged frames to maintain VLAN isolation."},
{q:"PVID tags what?",o:["All frames","Only tagged frames","Untagged frames with specified VLAN ID","BPDU frames"],a:2,e:"PVID assigns a VLAN to untagged frames received on a port."},
{q:"802.1Q VLAN tag is inserted where in the frame?",o:["Before preamble","Between source MAC and EtherType","After FCS","Between destination MAC and source MAC"],a:1,e:"4-byte VLAN tag inserted between source MAC and EtherType."},
{q:"VTP Transparent mode: what does the switch do?",o:["Advertises and syncs VLANs","Only syncs","Doesn't participate but forwards VTP ads","Blocks all VTP"],a:2,e:"Transparent mode doesn't advertise or sync but forwards VTP messages to neighbors."},
{q:"Native VLAN mismatch on trunk: result?",o:["Misdirected untagged frames, VLAN hopping risk","Error logged, traffic fine","DTP negotiates correct VLAN","STP blocks the port"],a:0,e:"Native VLAN mismatch causes untagged traffic problems and security risks."},
{q:"Management VLAN purpose?",o:["Guest isolation","Separates management traffic from user traffic for security","Routes through firewalls","User data transport"],a:1,e:"Management VLAN isolates admin traffic from user traffic."},
{q:"Selective VLAN accessibility on trunk. Cause?",o:["Trunk as access port","STP blocking","Allowed VLAN list misconfigured","Wrong encapsulation"],a:2,e:"If VLANs aren't in the trunk's allowed list, they won't traverse it."},
{q:"'trunk allowed vlan' command purpose?",o:["Enable trunk mode","Limit VLANs on a trunk port","Set native VLAN","Configure voice VLAN"],a:1,e:"Restricts which VLANs can traverse a specific trunk port."},
{q:"'switchport voice vlan' does what?",o:["Enables VTP","Enables PoE","Sets VLAN for IP phones/voice traffic","Configures QoS for voice"],a:2,e:"Assigns a dedicated voice VLAN separate from data VLAN."},
{q:"Which VTP mode allows local VLAN changes but doesn't share them?",o:["Server","Client","Transparent","Off"],a:2,e:"Transparent allows local VLAN config changes but doesn't advertise them to other switches."},
{q:"VTP Client mode: can you create VLANs locally?",o:["Yes","No","Only extended VLANs","Only with password"],a:1,e:"VTP Client cannot create, modify, or delete VLANs — it only receives from the server."},
{q:"What information does a VLAN tag contain?",o:["VLAN ID and priority only","VLAN ID, priority (PCP), and CFI/DEI","Only VLAN ID","IP address and VLAN ID"],a:1,e:"The 802.1Q tag includes: TPID, PCP (priority), DEI (drop eligible), and VLAN ID (12 bits)."},
]},

{id:22,name:"Inter-VLAN Routing",q:[
{q:"Layer 3 switches with SVIs: best for what?",o:["WAN routing","Inter-VLAN routing in campus networks","Wireless management","NAT"],a:0,e:"L3 switches with SVIs provide efficient, scalable inter-VLAN routing without external routers."},
{q:"Router-on-a-stick: missing 'encapsulation dot1Q 20' causes what?",o:["All VLANs work","VLAN 20 traffic not properly tagged/routed","Trunk fails","STP reconverges"],a:1,e:"Without encapsulation on the subinterface, VLAN 20 frames aren't processed correctly."},
{q:"Same-VLAN devices communicate but inter-VLAN fails. Layer 3 switch. Cause?",o:["VTP mismatch","ACLs blocking inter-VLAN traffic on SVIs","Trunk misconfiguration","Native VLAN mismatch"],a:1,e:"Intra-VLAN works but inter-VLAN doesn't = ACLs blocking traffic between SVIs."},
{q:"All inter-VLAN traffic inspected by centralized firewall. Best approach?",o:["VLAN ACLs","Layer 3 switch with ACLs redirecting to firewall","Router-on-a-stick","Private VLANs"],a:1,e:"L3 switch + PBR/ACLs redirects inter-VLAN traffic to the firewall for inspection."},
{q:"Router-on-a-stick requires what on the switch port?",o:["Access mode","Trunk mode","Etherchannel","Port security"],a:1,e:"The switch port connecting to the router must be a trunk to carry multiple VLANs."},
{q:"Which command creates a subinterface on a router?",o:["interface vlan 10","interface gig0/0.10","interface gig0/0 vlan 10","vlan 10 interface gig0/0"],a:1,e:"'interface gig0/0.10' creates subinterface .10 on physical interface gig0/0."},
{q:"On a subinterface, which command specifies the VLAN?",o:["switchport access vlan 10","encapsulation dot1Q 10","vlan 10","switchport trunk allowed vlan 10"],a:1,e:"'encapsulation dot1Q <VLAN-ID>' on a subinterface specifies which VLAN the subinterface handles."},
{q:"What must be assigned to each subinterface for routing?",o:["MAC address","IP address in the VLAN's subnet","OSPF area","Default gateway"],a:1,e:"Each subinterface needs an IP address in its respective VLAN subnet to act as the default gateway."},
{q:"SVI requires what global command to enable routing?",o:["ip routing","router ospf 1","interface vlan","sdm prefer dual-ipv4-and-ipv6"],a:0,e:"'ip routing' must be enabled globally on a Layer 3 switch for SVIs to route between VLANs."},
{q:"Which is more efficient for inter-VLAN routing: router-on-a-stick or Layer 3 switch?",o:["Router-on-a-stick","Layer 3 switch","They're equal","Depends on cable type"],a:1,e:"Layer 3 switches route in hardware (ASICs) — much faster than router-on-a-stick's single trunk link."},
{q:"Private VLANs restrict communication between what?",o:["VLANs and subnets","Ports within the same VLAN","Switches","Routers"],a:1,e:"PVLANs restrict communication between ports in the same VLAN — isolated ports can only talk to promiscuous ports."},
{q:"In PVLAN, promiscuous ports can communicate with what?",o:["Only isolated ports","Only community ports","All port types","Only other promiscuous ports"],a:2,e:"Promiscuous ports can communicate with both isolated and community ports."},
{q:"Which device is the default gateway for hosts in a VLAN?",o:["The access switch","The SVI or router subinterface IP for that VLAN","The trunk port","The root bridge"],a:1,e:"Hosts use the SVI or router subinterface IP as their default gateway for inter-VLAN communication."},
{q:"If 'ip routing' is not enabled on a Layer 3 switch, SVIs can still do what?",o:["Route between VLANs","Only provide management access, not routing","Nothing","Act as DHCP relay"],a:1,e:"Without 'ip routing', SVIs can be used for management (SSH/Telnet) but won't route between VLANs."},
{q:"How many subinterfaces can a router-on-a-stick support?",o:["2","8","16","Limited by router resources, not a fixed number"],a:3,e:"The number of subinterfaces is limited by router CPU, memory, and bandwidth — not a hard limit."},
]},

{id:23,name:"DHCP",q:[
{q:"DHCPREQUEST: what does the client communicate?",o:["Discovery","Accepted offered IP","Acknowledgment","Release"],a:1,e:"DHCPREQUEST tells the server the client accepts the offered IP."},
{q:"DHCP relay command on Cisco?",o:["dhcp-relay","ip helper-address <server-IP>","relay-helper","dhcp forward"],a:1,e:"'ip helper-address' on the interface forwards DHCP broadcasts to the specified server."},
{q:"Option 6 specifies what?",o:["TFTP server","Option 82 info","Vendor info","DNS server"],a:3,e:"Option 6 = DNS server addresses."},
{q:"Option 150 for Cisco IP phones provides what?",o:["DNS server","TFTP server address","Gateway","Domain name"],a:1,e:"Option 150 = TFTP server IP for Cisco VoIP phones."},
{q:"'ip dhcp excluded-address' does what?",o:["Creates pool","Excludes addresses from dynamic assignment","Sets gateway","Configures DNS"],a:1,e:"Prevents specified range from being assigned to DHCP clients."},
{q:"DHCP snooping drops DHCPOFFER from untrusted port. Why?",o:["Port is down","Prevents rogue DHCP servers","Frame too large","Wrong VLAN"],a:1,e:"Untrusted ports shouldn't send DHCP server messages — only client messages."},
{q:"'ip dhcp snooping vlan 10' does what?",o:["Creates VLAN 10","Enables DHCP snooping on VLAN 10","Disables DHCP on VLAN 10","Trusts VLAN 10"],a:1,e:"Enables DHCP snooping specifically for VLAN 10."},
{q:"Multiple DHCP conflicts shown. Likely cause?",o:["Overlapping DHCP server scopes","Pool exhausted","Wrong mask","Static leases"],a:0,e:"Duplicate assignments from overlapping scopes on multiple DHCP servers."},
{q:"Option 3 assigns what?",o:["WINS server","Default gateway","DNS domain","DNS server"],a:1,e:"Option 3 = Default router (gateway) for DHCP clients."},
{q:"Best practice for consistent printer IP?",o:["Static IP","Longer lease time","Dynamic DNS","DHCP reservation for printer's MAC"],a:3,e:"DHCP reservation ties a specific IP to a MAC address permanently."},
{q:"DORA process order?",o:["Discover, Offer, Request, Acknowledge","Discover, Offer, Acknowledge, Request","Request, Offer, Discover, Acknowledge","Offer, Discover, Request, Acknowledge"],a:0,e:"DORA: Discover→Offer→Request→Acknowledge."},
{q:"'ip dhcp snooping trust' on a port means what?",o:["Port is untrusted","Port is trusted for DHCP server messages","DHCP is disabled","Port is shut down"],a:1,e:"Trusted ports allow DHCP server messages (OFFER, ACK). Usually configured toward legitimate DHCP servers."},
{q:"DHCP starvation attack: what does the attacker do?",o:["Spoofs DNS","Exhausts all available IPs with fake requests","Modifies DHCP packets","Blocks DHCP traffic"],a:1,e:"Attacker sends massive DHCPDISCOVER with spoofed MACs, exhausting the IP pool."},
{q:"Which prevents DHCP starvation?",o:["Port security limiting MAC addresses","DAI","ACLs","NAT"],a:0,e:"Port security limits MACs per port, preventing mass spoofed DHCP requests."},
{q:"'ip dhcp pool MYPOOL' followed by 'network 192.168.1.0 255.255.255.0': what is created?",o:["Static route","DHCP address pool for that subnet","VLAN","ACL"],a:1,e:"Creates a DHCP pool that assigns addresses from the 192.168.1.0/24 range."},
]},

{id:24,name:"HSRP",q:[
{q:"'standby 1 preempt': purpose?",o:["Sets priority","Allows higher-priority router to take over as Active","Sets virtual IP","Configures timers"],a:1,e:"Without preempt, a higher-priority router won't take over from the current Active."},
{q:"Router A (110 priority) recovers after failure. Router B (100) is Active. Result?",o:["B stays Active","A preempts and becomes Active; B goes to Standby","Both Active","Both Standby"],a:1,e:"With preemption, Router A (higher priority) takes over as Active."},
{q:"HSRP virtual IP is used by hosts as what?",o:["DNS server","Default gateway","NTP server","SNMP target"],a:1,e:"Hosts use the HSRP virtual IP as their default gateway for transparent failover."},
{q:"Default HSRP priority?",o:["50","100","110","255"],a:1,e:"HSRP default priority=100. Higher priority = preferred Active router."},
{q:"HSRP Active router fails. What takes over?",o:["Nothing — traffic stops","Standby router becomes Active","All routers renegotiate","Switch takes over routing"],a:1,e:"The Standby router immediately becomes the Active router."},
{q:"HSRP group number range?",o:["0-7","0-255","0-4095","1-65535"],a:1,e:"HSRP v1: groups 0-255. HSRP v2: groups 0-4095."},
{q:"Which HSRP version supports IPv6?",o:["HSRP v1","HSRP v2","Both","Neither"],a:1,e:"HSRP v2 supports IPv6 and expanded group numbers (0-4095)."},
{q:"'standby 1 track' does what?",o:["Tracks NTP sync","Adjusts priority based on tracked interface state","Tracks neighbors","Monitors bandwidth"],a:1,e:"Interface tracking decrements HSRP priority if a tracked interface goes down."},
{q:"HSRP states in order?",o:["Init, Learn, Listen, Speak, Standby, Active","Active, Standby, Init","Listen, Speak, Active","Init, Active, Standby"],a:0,e:"HSRP states: Initial→Learn→Listen→Speak→Standby→Active."},
{q:"How many Active routers per HSRP group?",o:["1","2","Unlimited","Depends on priority"],a:0,e:"Only one Active router per HSRP group at any time."},
{q:"HSRP uses which virtual MAC address format?",o:["Physical MAC of Active router","0000.0c07.acXX (XX=group number in hex)","FF:FF:FF:FF:FF:FF","Random MAC"],a:1,e:"HSRP v1 uses 0000.0c07.acXX where XX is the group number in hex."},
{q:"VRRP is the standards-based equivalent of what?",o:["STP","HSRP","VTP","LACP"],a:1,e:"VRRP (Virtual Router Redundancy Protocol) is the IEEE standard version of Cisco's HSRP."},
{q:"GLBP differs from HSRP how?",o:["GLBP is Layer 3 only","GLBP provides load balancing across multiple routers","GLBP doesn't support preemption","GLBP is standards-based"],a:1,e:"GLBP allows multiple routers to actively forward traffic — load balancing, unlike HSRP's active/standby model."},
{q:"If preempt is NOT configured and the original Active router recovers?",o:["It becomes Active again","It stays in Standby; current Active keeps role","It becomes Standby","Network goes down"],a:1,e:"Without preempt, the recovered router stays in Standby — the current Active retains its role."},
{q:"HSRP hello and hold timers default?",o:["3 sec hello, 10 sec hold","5 sec hello, 15 sec hold","10 sec hello, 30 sec hold","1 sec hello, 3 sec hold"],a:0,e:"Default: hello=3 seconds, hold=10 seconds."},
]},
